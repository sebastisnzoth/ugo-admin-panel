<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>U.GO — Servicios del hogar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:'Inter',-apple-system,sans-serif;}
:root{--c:#00C8D7;--cd:rgba(0,200,215,.1);--cm:rgba(0,200,215,.26);--k:#111;--w:#FFF;--bg:#F7F7F7;--m:#888;--b:#EBEBEB;--g:#22C55E;--r:#EF4444;--a:#F59E0B;}
#auth{position:fixed;inset:0;z-index:200;background:linear-gradient(160deg,#0f1117,#1a2530);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
#auth.hide{display:none;}
.al{font-size:38px;font-weight:900;color:#FFF;letter-spacing:-1.5px;}
.als{font-size:11px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:2.5px;margin-top:2px;margin-bottom:32px;}
.acard{background:#FFF;border-radius:24px;padding:22px;width:100%;max-width:380px;}
.atit{font-size:19px;font-weight:800;margin-bottom:3px;}
.adesc{font-size:13px;color:#888;margin-bottom:18px;}
.afl{margin-bottom:11px;}
.afl label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#888;margin-bottom:4px;}
.afl input{width:100%;padding:11px 13px;border:1.5px solid #E5E5E5;border-radius:12px;font-size:14px;font-family:inherit;outline:none;color:#111;transition:border .2s;}
.afl input:focus{border-color:var(--c);}
.ag2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.abtn{width:100%;padding:13px;background:#111;color:#FFF;border:none;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:5px;transition:opacity .2s;}
.abtn:active{opacity:.8;}
.alink{text-align:center;font-size:13px;color:#888;margin-top:11px;cursor:pointer;}
.alink b{color:#00828F;}
.aerr{background:#FEF2F2;border:1px solid #FCA5A5;border-radius:10px;padding:9px 12px;font-size:12px;color:#DC2626;margin-bottom:10px;display:none;}
#map{position:fixed;inset:0;z-index:0;}
.leaflet-container{background:#EAE6DF;}
#top{position:fixed;top:0;left:0;right:0;z-index:20;padding:max(48px,env(safe-area-inset-top,48px)) 18px 14px;background:linear-gradient(to bottom,rgba(255,255,255,.97) 65%,transparent);display:flex;align-items:center;justify-content:space-between;}
.logo{font-weight:900;font-size:22px;letter-spacing:-.6px;color:var(--k);}
.logo-s{font-size:11px;color:var(--m);margin-top:-2px;}
.top-r{display:flex;align-items:center;gap:8px;}
.loc-chip{background:rgba(0,0,0,.06);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:600;color:var(--k);display:flex;align-items:center;gap:5px;}
.langb{background:var(--k);color:var(--w);border:none;border-radius:14px;padding:5px 11px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;}
#sheet{position:fixed;left:0;right:0;z-index:25;background:var(--w);border-top-left-radius:26px;border-top-right-radius:26px;box-shadow:0 -6px 28px rgba(0,0,0,.13);transition:bottom .38s cubic-bezier(.32,.72,0,1),height .38s cubic-bezier(.32,.72,0,1);overflow:hidden;bottom:78px;height:0;}
.handle{width:34px;height:4px;background:var(--b);border-radius:2px;margin:9px auto 0;flex-shrink:0;}
#sb{height:calc(100% - 22px);overflow-y:auto;}
#nav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:var(--w);border-top:1px solid var(--b);padding:8px 4px max(20px,env(safe-area-inset-bottom,20px));display:flex;align-items:center;justify-content:space-around;height:78px;}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;background:none;border:none;font-family:inherit;padding:4px 10px;border-radius:12px;position:relative;}
.ni-ic{font-size:19px;line-height:1;}
.ni-lb{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--m);}
.ni.on .ni-lb{color:var(--c);}
.nbadge{position:absolute;top:-2px;right:-2px;width:8px;height:8px;background:var(--r);border-radius:50%;border:1.5px solid #FFF;display:none;}
.nbadge.show{display:block;}
#orb{width:60px;height:60px;border-radius:50%;background:linear-gradient(145deg,#00ECF8,#009AAA);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;margin-top:-24px;animation:op 2.5s ease-in-out infinite;border:none;font-family:inherit;transition:transform .15s;}
#orb:active{transform:scale(.93);}
@keyframes op{0%,100%{box-shadow:0 0 0 8px rgba(0,200,215,.14),0 4px 18px rgba(0,200,215,.42);}50%{box-shadow:0 0 0 16px rgba(0,200,215,.06),0 4px 26px rgba(0,200,215,.64);}}
.btnm{width:100%;padding:14px;background:var(--k);color:var(--w);border:none;border-radius:26px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s;}
.btnm:active{opacity:.85;}
.btng{width:100%;padding:14px;background:#22C55E;color:var(--w);border:none;border-radius:26px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.btor{width:100%;padding:11px;background:none;color:var(--r);border:1.5px solid var(--r);border-radius:26px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.cmsg{display:flex;gap:7px;align-items:flex-end;animation:fi .2s ease;}
.cmsg-r{justify-content:flex-end;}
.uorb{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#00ECF8,#009AAA);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.b-u{background:#F0F0F0;border-radius:16px 16px 16px 4px;padding:9px 13px;font-size:13px;max-width:82%;line-height:1.5;}
.b-me{background:var(--k);color:var(--w);border-radius:16px 16px 4px 16px;padding:9px 13px;font-size:13px;max-width:82%;line-height:1.5;}
.dot{width:6px;height:6px;border-radius:50%;background:#999;animation:da 1s ease-in-out infinite;display:inline-block;}
.pcard{background:#FFF;border-radius:20px;box-shadow:0 4px 18px rgba(0,0,0,.1);padding:14px;cursor:pointer;border:2px solid transparent;transition:all .2s;}
.pcard.sel{border-color:var(--c);}
.pcard:active{transform:scale(.98);}
.sbox{background:#F5F5F5;border-radius:12px;padding:8px;text-align:center;}
.slbl{font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.sval{font-weight:800;font-size:16px;}
.pill-g{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(34,197,94,.1);color:#16A34A;}
.pill-c{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;background:var(--cd);color:#00828F;}
.pill-a{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(245,158,11,.1);color:#B45309;}
::-webkit-scrollbar{width:2px;}::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);}
@keyframes da{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-4px);opacity:1}}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
#notif-overlay{position:fixed;top:max(100px,env(safe-area-inset-top,100px));left:16px;right:16px;z-index:50;transform:translateY(-120%);transition:transform .4s cubic-bezier(.32,.72,0,1);}
#notif-overlay.show{transform:translateY(0);}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div class="al">U.GO</div>
  <div class="als">Servicios del hogar</div>
  <div class="acard">
    <div id="aerr" class="aerr"></div>
    <div id="vlog">
      <div class="atit">Bienvenido</div>
      <div class="adesc">Ingresá a tu cuenta</div>
      <div class="afl"><label>Email</label><input id="le" type="email" placeholder="tu@email.com"/></div>
      <div class="afl"><label>Contraseña</label><input id="lp" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <button class="abtn" onclick="doLogin()">Ingresar →</button>
      <div class="alink" onclick="sw('reg')">¿Primera vez? <b>Crear cuenta</b></div>
    </div>
    <div id="vreg" style="display:none">
      <div class="atit">Crear cuenta</div>
      <div class="adesc">Registrate como cliente de U.GO</div>
      <div class="ag2">
        <div class="afl"><label>Nombre</label><input id="rn" placeholder="Ana"/></div>
        <div class="afl"><label>Apellido</label><input id="ra" placeholder="López"/></div>
      </div>
      <div class="afl"><label>Email</label><input id="re" type="email" placeholder="tu@email.com"/></div>
      <div class="afl"><label>Teléfono</label><input id="rt" type="tel" placeholder="+55 48 9 9999-9999"/></div>
      <div class="afl"><label>Contraseña</label><input id="rp" type="password" placeholder="Mínimo 6 caracteres"/></div>
      <button class="abtn" onclick="doRegister()">Crear cuenta →</button>
      <div class="alink" onclick="sw('log')">¿Ya tenés cuenta? <b>Ingresá</b></div>
    </div>
  </div>
</div>

<!-- NOTIFICACIÓN ADMIN -->
<div id="notif-overlay">
  <div id="notif-card" style="background:#FFF;border-radius:18px;padding:16px;box-shadow:0 8px 32px rgba(0,0,0,.18);"></div>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- TOP -->
<div id="top">
  <div>
    <div class="logo">U.GO</div>
    <div class="logo-s" id="top-s">Cargando...</div>
  </div>
  <div class="top-r">
    <div class="loc-chip">📍 <span id="top-loc">Florianópolis</span></div>
    <button class="langb" id="lb" onclick="tgl()">PT</button>
  </div>
</div>

<!-- SHEET -->
<div id="sheet"><div class="handle"></div><div id="sb"></div></div>

<!-- NAV -->
<nav id="nav">
  <button class="ni on" id="ni-radar" onclick="navTo('radar')"><span class="ni-ic">🏠</span><span class="ni-lb" id="nl-r">Inicio</span></button>
  <button class="ni" id="ni-trab" onclick="navTo('trabajos')" style="position:relative;"><span class="ni-ic">⚡</span><span class="nbadge" id="nbadge"></span><span class="ni-lb" id="nl-t">Servicios</span></button>
  <button id="orb" onclick="openChat()">🌀</button>
  <button class="ni" id="ni-bov" onclick="navTo('boveda')"><span class="ni-ic">🔒</span><span class="ni-lb" id="nl-b">Bóveda</span></button>
  <button class="ni" id="ni-perf" onclick="navTo('perfil')"><span class="ni-ic">👤</span><span class="ni-lb" id="nl-p">Perfil</span></button>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const SB_URL='https://byajcqrgetloavrgyqak.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ5YWpjcXJnZXRsb2F2cmd5cWFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NzA5NTMsImV4cCI6MjA5NzA0Njk1M30.vkeb10BBuu06mOrMdOw1K3SBhTbl02KbOUp6lSOhRDs';
const FN=SB_URL+'/functions/v1';
const sb=supabase.createClient(SB_URL,SB_KEY);

// ── STATE ──
let SESSION=null,CLIENT=null,lang='es',myLat=-27.5954,myLng=-48.5480;
let MAP=null,myMark=null,provMark=null,routeLine=null;
let ACTIVE_SVC=null,SELECTED_PROV=null,starsV=0;
let rtSvc=null,rtProv=null,rtNotif=null;
let chatHistory=[];
let pendingCatId=null,pendingDesc='',pendingProviders=[];

// ── TRANSLATIONS ──
const TR={
  es:{sub:'● Sistema activo',loc:'Florianópolis',lb:'PT',
      hello:'¡Hola',wlc:'Soy Hugo, tu asistente de servicios. ¿Qué necesitás hoy?',
      sugs:['🔧 Electricista','🪠 Plomero','🧹 Limpieza','🎨 Pintura','❄️ Aire acond.','🔑 Cerrajero'],
      searching:'Buscando proveedores disponibles...',noProvs:'Sin proveedores disponibles ahora. Te avisamos cuando haya uno cerca.',
      book:'Contratar por R$',confirm:'Confirmar servicio',cancel:'Cancelar',
      tracked:'Tu proveedor está en camino',eta:'ETA',min:'min',
      inprog:'Servicio en progreso',worknote:'Marco está trabajando...',
      photos:'Fotos del trabajo',photosD:'Tu proveedor envió evidencias del trabajo realizado',
      approve:'✓ Aprobar y liberar pago',dispute:'⚑ Abrir disputa',
      rq:'¿Cómo estuvo el servicio?',cm:'Comentario (opcional)...',sbm:'Enviar calificación',
      done:'¡Trabajo completado!',dones:'Tu pago fue liberado al proveedor',
      ns:'Solicitar otro servicio',
      noJob:'Sin servicios activos',noJobS:'Usá el botón ● para solicitar un servicio',
      bovTitle:'🔒 Bóveda U.GO',bovP:'Tu pago está protegido. Se libera al proveedor solo cuando vos aprobás el trabajo.',
      histTitle:'Historial de servicios',
      perfTitle:'Mi perfil',perfServ:'Servicios',perfGasto:'Gasto total',
      cerrar:'Cerrar sesión',
      nlt:{r:'Inicio',t:'Servicios',b:'Bóveda',p:'Perfil'}},
  pt:{sub:'● Sistema ativo',loc:'Florianópolis',lb:'ES',
      hello:'Olá',wlc:'Sou o Hugo, seu assistente de serviços. O que você precisa hoje?',
      sugs:['🔧 Eletricista','🪠 Encanador','🧹 Limpeza','🎨 Pintura','❄️ Ar condic.','🔑 Chaveiro'],
      searching:'Buscando profissionais disponíveis...',noProvs:'Sem profissionais disponíveis agora. Avisaremos quando houver um perto.',
      book:'Contratar por R$',confirm:'Confirmar serviço',cancel:'Cancelar',
      tracked:'Seu profissional está a caminho',eta:'ETA',min:'min',
      inprog:'Serviço em andamento',worknote:'Marco está trabalhando...',
      photos:'Fotos do trabalho',photosD:'Seu profissional enviou evidências do trabalho realizado',
      approve:'✓ Aprovar e liberar pagamento',dispute:'⚑ Abrir disputa',
      rq:'Como foi o serviço?',cm:'Comentário (opcional)...',sbm:'Enviar avaliação',
      done:'Trabalho concluído!',dones:'Seu pagamento foi liberado ao profissional',
      ns:'Solicitar outro serviço',
      noJob:'Sem serviços ativos',noJobS:'Use o botão ● para solicitar um serviço',
      bovTitle:'🔒 Cofre U.GO',bovP:'Seu pagamento está protegido. É liberado ao profissional somente quando você aprovar o trabalho.',
      histTitle:'Histórico de serviços',
      perfTitle:'Meu perfil',perfServ:'Serviços',perfGasto:'Gasto total',
      cerrar:'Sair da conta',
      nlt:{r:'Início',t:'Serviços',b:'Cofre',p:'Perfil'}},
};
const tt=()=>TR[lang];

// ── AUTH ──
sb.auth.onAuthStateChange(async(ev,ses)=>{
  SESSION=ses;
  if(ses){ await initClient(); document.getElementById('auth').classList.add('hide'); }
  else document.getElementById('auth').classList.remove('hide');
});
function sw(v){document.getElementById('vlog').style.display=v==='log'?'':'none';document.getElementById('vreg').style.display=v==='reg'?'':'none';showErr('');}
function showErr(m){const e=document.getElementById('aerr');e.textContent=m;e.style.display=m?'block':'none';}
async function doLogin(){
  const{error}=await sb.auth.signInWithPassword({email:document.getElementById('le').value.trim(),password:document.getElementById('lp').value});
  if(error) showErr(error.message==='Invalid login credentials'?'Email o contraseña incorrectos':error.message);
}
async function doRegister(){
  const n=document.getElementById('rn').value.trim(),a=document.getElementById('ra').value.trim();
  const e=document.getElementById('re').value.trim(),t=document.getElementById('rt').value.trim(),p=document.getElementById('rp').value;
  if(!n||!e||!p) return showErr('Completá los campos requeridos');
  if(p.length<6) return showErr('Contraseña mínimo 6 caracteres');
  const r=await fetch(`${FN}/register-provider`,{method:'POST',headers:{'Content-Type':'application/json','apikey':SB_KEY},body:JSON.stringify({nombre:n,apellido:a,email:e,password:p,telefono:t,categoria_id:'6b389fbd-4de4-4715-bbdb-1ac800ddaa5d',tipo:'cliente'})});
  // Fallback: registro estándar con tipo cliente
  const{data,error}=await sb.auth.signUp({email:e,password:p});
  if(error) return showErr(error.message);
  if(data.user){
    await sb.from('usuarios').insert({auth_id:data.user.id,email:e,nombre:n,apellido:a,telefono:t,tipo:'cliente',pais:'BR',zona:'Florianópolis'});
    // Auto-login
    const{error:le}=await sb.auth.signInWithPassword({email:e,password:p});
    if(le) showErr('Cuenta creada. Ingresá con tu email y contraseña.');
  }
}

// ── INIT CLIENT ──
async function initClient(){
  let{data}=await sb.from('usuarios').select('*').eq('auth_id',SESSION.user.id).single();
  if(!data){
    // Buscar por email, ligar auth_id
    const{data:byEmail}=await sb.from('usuarios').select('*').eq('email',SESSION.user.email).single();
    if(byEmail){ await sb.from('usuarios').update({auth_id:SESSION.user.id}).eq('email',SESSION.user.email); data=byEmail; }
    else{ // Crear perfil mínimo
      const meta=SESSION.user.user_metadata||{};
      await sb.from('usuarios').insert({auth_id:SESSION.user.id,email:SESSION.user.email,nombre:meta.nombre||SESSION.user.email.split('@')[0],tipo:'cliente',pais:'BR',zona:'Florianópolis'});
      const{data:nd}=await sb.from('usuarios').select('*').eq('auth_id',SESSION.user.id).single();
      data=nd;
    }
  }
  CLIENT=data;
  document.getElementById('top-s').textContent=`Hola, ${data.nombre} · ${tt().sub}`;
  initMap(); startGPS(); subscribeRealtime(); showRadar();
  // Check if active service
  const{data:svc}=await sb.from('servicios').select('*,categorias:categoria_id(nombre,emoji),proveedores:proveedor_id(nombre,karma)').eq('cliente_id',data.id).in('estado',['negociando','confirmado','en_camino','ejecutando']).order('created_at',{ascending:false}).limit(1).single();
  if(svc){ ACTIVE_SVC=svc; document.getElementById('nbadge').classList.add('show'); }
}

// ── MAP ──
function initMap(){
  if(MAP) return;
  MAP=L.map('map',{zoomControl:false,center:[myLat,myLng],zoom:14});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© CARTO',maxZoom:19}).addTo(MAP);
  // Demand zones
  [[-27.590,-48.548,350,'rgba(0,200,215,.12)'],[- 27.610,-48.520,250,'rgba(0,200,215,.09)'],[-27.575,-48.565,280,'rgba(0,200,215,.08)']].forEach(([la,ln,r,c])=>{
    L.circle([la,ln],{radius:r,color:'none',fillColor:c,fillOpacity:1}).addTo(MAP);
  });
  myMark=L.marker([myLat,myLng],{icon:L.divIcon({html:`<div style="width:40px;height:40px;border-radius:50%;background:#111;border:3px solid white;display:flex;align-items:center;justify-content:center;font-weight:800;color:#FFF;font-size:12px;box-shadow:0 4px 14px rgba(0,0,0,.3);">EU</div>`,className:'',iconSize:[40,40],iconAnchor:[20,20]})}).addTo(MAP);
}

function startGPS(){
  if(!navigator.geolocation) return;
  let lastLat=0,lastLng=0;
  navigator.geolocation.watchPosition(pos=>{
    myLat=pos.coords.latitude; myLng=pos.coords.longitude;
    if(myMark) myMark.setLatLng([myLat,myLng]);
    if(haversine(lastLat,lastLng,myLat,myLng)*1000>50){ lastLat=myLat; lastLng=myLng; }
  },null,{enableHighAccuracy:true,maximumAge:10000});
}

function showProviderOnMap(lat,lng,nombre){
  if(provMark) MAP.removeLayer(provMark);
  const ini=nombre?.[0]||'P';
  provMark=L.marker([lat,lng],{icon:L.divIcon({html:`<div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(145deg,#00ECF8,#009AAA);border:3px solid white;display:flex;align-items:center;justify-content:center;font-weight:800;color:#FFF;font-size:13px;box-shadow:0 4px 14px rgba(0,200,215,.4);">${ini}</div>`,className:'',iconSize:[40,40],iconAnchor:[20,20]})}).addTo(MAP);
  if(routeLine) MAP.removeLayer(routeLine);
  routeLine=L.polyline([[myLat,myLng],[lat,lng]],{color:'#00C8D7',weight:4,opacity:.7,dashArray:'8,5'}).addTo(MAP);
  MAP.fitBounds([[myLat,myLng],[lat,lng]],{padding:[80,80]});
}

function clearProvMap(){ if(provMark){MAP.removeLayer(provMark);provMark=null;} if(routeLine){MAP.removeLayer(routeLine);routeLine=null;} MAP.setView([myLat,myLng],14); }

// ── REALTIME ──
function subscribeRealtime(){
  if(!CLIENT) return;
  // Notificaciones del admin
  rtNotif=sb.channel('client-notifs-'+CLIENT.id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'notificaciones',filter:`usuario_id=eq.${CLIENT.id}`},p=>showNotifOverlay(p.new))
    .subscribe();
  // Seguimiento del servicio activo
  subscribeActiveService();
}

function subscribeActiveService(){
  if(!ACTIVE_SVC||!CLIENT) return;
  if(rtSvc) sb.removeChannel(rtSvc);
  rtSvc=sb.channel('svc-'+ACTIVE_SVC.id)
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'servicios',filter:`id=eq.${ACTIVE_SVC.id}`},p=>{
      ACTIVE_SVC={...ACTIVE_SVC,...p.new};
      const st=p.new.estado;

function showSugs(){
  const sugs=document.getElementById('c-sugs'); if(!sugs) return;
  sugs.innerHTML=tt().sugs.map(s=>`<button onclick="sendSug('${s}')" style="padding:7px 13px;border-radius:20px;border:1.5px solid var(--b);background:#FFF;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;" onmouseover="this.style.borderColor='#00C8D7'" onmouseout="this.style.borderColor='var(--b)'">${s}</button>`).join('');

async function sendChat(){
  const inp=document.getElementById('chat-in');
  const msg=inp?.value.trim(); if(!msg) return;
  inp.value=''; addMsg('user',msg); showTyping();
  const sugs=document.getElementById('c-sugs'); if(sugs) sugs.innerHTML='';
  await callHugo(msg);
}

async function sendSug(sug){
  addMsg('user',sug);
  const sugs=document.getElementById('c-sugs'); if(sugs) sugs.innerHTML='';
  showTyping();
  // Detectar categoría del suggestion
  const catMap={'electricista':'6b389fbd-4de4-4715-bbdb-1ac800ddaa5d','eletricista':'6b389fbd-4de4-4715-bbdb-1ac800ddaa5d'};
  const lower=sug.toLowerCase();
  for(const[k,v] of Object.entries(catMap)){if(lower.includes(k)){pendingCatId=v;break;}}
  await callHugo(sug);
}

async function callHugo(msg){
  chatHistory.push({role:'user',content:msg});
  const ctx=CLIENT?`Cliente:${CLIENT.nombre},Ubicación:Florianópolis,GPS:${myLat.toFixed(4)},${myLng.toFixed(4)}`:'';
  try{
    const r=await fetch('https://ugo-admin-panel.vercel.app/api/hugo/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({role:'cliente',message:msg,context:ctx,history:chatHistory.slice(-6)})});
    const d=await r.json();
    const reply=d.hugo_mensaje||'...';
    document.getElementById('typ')?.remove();
    addMsg('ugo',reply);
    chatHistory.push({role:'assistant',content:reply});
    // Show search button after 2 exchanges
    if(chatHistory.length>=4){
      const ca=document.getElementById('c-action'); if(ca){ca.style.display='block';}
      const sb_btn=document.getElementById('c-search-btn');
      if(sb_btn) sb_btn.onclick=()=>searchProviders();
    }
  }catch{
    document.getElementById('typ')?.remove();
    addMsg('ugo','Estoy teniendo dificultades para conectar. Intentá de nuevo en un momento.');
  }
}

function addMsg(from,text){
  const cm=document.getElementById('cm');if(!cm)return;
  const d=document.createElement('div');d.className='cmsg'+(from==='user'?' cmsg-r':'');
  if(from==='ugo') d.innerHTML=`<div class="uorb">🌀</div><div class="b-u">${text}</div>`;
  else d.innerHTML=`<div class="b-me">${text}</div>`;
  cm.appendChild(d);setTimeout(()=>cm.scrollTop=cm.scrollHeight,40);
}
function showTyping(){
  const cm=document.getElementById('cm');if(!cm)return;
  const d=document.createElement('div');d.className='cmsg';d.id='typ';
  d.innerHTML=`<div class="uorb">🌀</div><div class="b-u"><div style="display:flex;gap:4px;"><span class="dot" style="animation-delay:0s"/><span class="dot" style="animation-delay:.15s"/><span class="dot" style="animation-delay:.3s"/></div></div>`;
  cm.appendChild(d);cm.scrollTop=cm.scrollHeight;
}

async function searchProviders(){
  const ca=document.getElementById('c-action'); if(ca) ca.style.display='none';
  addMsg('ugo',tt().searching); showTyping();
  const desc=chatHistory.filter(m=>m.role==='user').map(m=>m.content).join('. ');
  // Get categories to pick one
  if(!pendingCatId){
    const{data:cats}=await sb.from('categorias').select('id,nombre').eq('activa',true).limit(1);
    if(cats?.length) pendingCatId=cats[0].id;
  }
  try{
    const r=await fetch(`${FN}/service-create`,{method:'POST',headers:{Authorization:`Bearer ${SESSION.access_token}`,'Content-Type':'application/json'},body:JSON.stringify({categoria_id:pendingCatId,descripcion:desc.slice(0,200),lat:myLat,lng:myLng,direccion:'Florianópolis, SC',zona:'Centro'})});
    const d=await r.json();
    document.getElementById('typ')?.remove();
    if(d.ok){
      ACTIVE_SVC={id:d.servicio_id,estado:'negociando',lat_cliente:myLat,lng_cliente:myLng};
      pendingProviders=d.proveedores_cercanos||[];
      subscribeActiveService();
      if(pendingProviders.length>0) showProviderCards(pendingProviders);
      else addMsg('ugo',tt().noProvs);
    } else addMsg('ugo',`Error: ${d.error||'No se pudo crear el servicio'}`);
  }catch(e){ document.getElementById('typ')?.remove(); addMsg('ugo','Sin conexión. Intentá de nuevo.'); }
}

        <div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(145deg,#00ECF8,#009AAA);display:flex;align-items:center;justify-content:center;font-weight:800;color:#FFF;font-size:20px;">${(CLIENT.nombre||'U')[0]}</div>
        <div><div style="font-weight:800;font-size:18px;">${CLIENT.nombre} ${CLIENT.apellido||''}</div><div style="font-size:13px;color:#888;margin-top:2px;">${CLIENT.email}</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px;">
        <div class="sbox"><div class="slbl">${tt().perfServ}</div><div class="sval">${svcs?.length||0}</div></div>
        <div class="sbox"><div class="slbl">${tt().perfGasto}</div><div class="sval">R$${gastoTotal.toFixed(0)}</div></div>
      </div>
      <button class="btor" onclick="doLogout()">${tt().cerrar}</button>
    </div>`);
}

function navTo(id){
  setActiveNav(id);
  if(id==='radar') showRadar();
  else if(id==='trabajos') showTrabajos();
  else if(id==='boveda') showBoveda();
  else if(id==='perfil') showPerfil();
}

function showNotifOverlay(n){
  const card=document.getElementById('notif-card'),ov=document.getElementById('notif-overlay');
  card.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
      <div class="uorb" style="width:32px;height:32px;font-size:16px;">🌀</div>

    </div>
    <div style="font-size:13px;color:#444;line-height:1.5;margin-bottom:10px;">${n.cuerpo}</div>
    <button style="width:100%;padding:9px;background:#111;color:#FFF;border:none;border-radius:14px;font-size:13px;font-weight:700;cursor:pointer;" onclick="document.getElementById('notif-overlay').classList.remove('show')">Entendido ✓</button>`;
  ov.classList.add('show');
  if(navigator.vibrate) navigator.vibrate([100,50,100]);

// ── UTILS ──
async function doLogout(){ await sb.auth.signOut(); CLIENT=null;SESSION=null;ACTIVE_SVC=null; }
function haversine(lat1,lng1,lat2,lng2){const R=6371,dL=(lat2-lat1)*Math.PI/180,dN=(lng2-lng1)*Math.PI/180;const a=Math.sin(dL/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dN/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function showToast(msg,dur=3000){const t=document.createElement('div');t.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#111;color:#FFF;padding:10px 18px;border-radius:24px;font-size:13px;font-weight:600;z-index:9999;white-space:nowrap;animation:fi .2s ease;';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),dur);}
