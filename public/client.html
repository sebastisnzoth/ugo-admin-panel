<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>U.GO Cliente</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:-apple-system,'Inter',sans-serif;background:#1a2030}
:root{--c:#00C8D7;--k:#111;--w:#fff;--g:#22C55E;--r:#EF4444;--m:#888;--b:#eee}

/* ── AUTH ── */
#auth{position:fixed;inset:0;z-index:100;background:linear-gradient(160deg,#08090d,#0d1117);display:flex;align-items:center;justify-content:center;padding:20px}
.abox{width:100%;max-width:360px}
.alogo{font-size:34px;font-weight:900;color:#fff;letter-spacing:-1px;margin-bottom:2px}
.alogo b{color:var(--c)}
.asub{font-size:12px;color:#555;margin-bottom:28px}
.atabs{display:flex;background:rgba(255,255,255,.06);border-radius:12px;padding:3px;margin-bottom:18px}
.atab{flex:1;text-align:center;padding:8px;border-radius:9px;font-size:13px;font-weight:600;color:#555;cursor:pointer;transition:.2s}
.atab.on{background:rgba(255,255,255,.1);color:#fff}
.aform{display:none}.aform.on{display:block}
.afl{margin-bottom:11px}
.afl label{display:block;font-size:10px;font-weight:700;color:#555;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.afl input{width:100%;padding:11px 13px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);border-radius:11px;color:#fff;font-size:14px;font-family:inherit;outline:none;transition:.2s}
.afl input:focus{border-color:var(--c)}
.afl input::placeholder{color:#444}
.abtn{width:100%;padding:13px;background:var(--c);color:#000;font-weight:800;font-size:14px;border:none;border-radius:13px;cursor:pointer;margin-top:4px;font-family:inherit}
.abtn:active{opacity:.85}
.aor{text-align:center;color:#444;font-size:11px;margin:10px 0}
.agbtn{width:100%;padding:12px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);border-radius:13px;color:#fff;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
.agbtn:active{background:rgba(255,255,255,.14)}
#aerr,#aerr2{display:none;color:var(--r);font-size:12px;margin-top:8px;padding:8px 12px;background:rgba(239,68,68,.1);border-radius:8px}

/* ── MAP ── */
#map{position:fixed;inset:0;z-index:0}

/* ── TOP ── */
#top{position:fixed;top:0;left:0;right:0;z-index:20;padding:max(48px,env(safe-area-inset-top,48px)) 16px 12px;background:linear-gradient(to bottom,rgba(255,255,255,.97) 60%,transparent);display:flex;align-items:center;justify-content:space-between}
.tlogo{font-weight:900;font-size:20px;letter-spacing:-.5px;color:var(--k)}
.tlogo span{color:var(--c)}
.tsub{font-size:11px;color:var(--m);margin-top:-1px}
.lchip{background:rgba(0,0,0,.06);border-radius:18px;padding:5px 11px;font-size:11px;font-weight:600;color:var(--k);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── SHEET ── */
#sheet{position:fixed;left:0;right:0;z-index:25;background:#fff;border-radius:24px 24px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.08);overflow:hidden;bottom:78px;height:0;transition:height .35s cubic-bezier(.32,.72,0,1)}
.shandle{width:32px;height:4px;background:#e5e5e5;border-radius:2px;margin:8px auto 6px}
#sb{height:calc(100% - 20px);overflow-y:auto;padding-bottom:16px}
.pad{padding:0 16px}
.stt{font-weight:800;font-size:16px;color:var(--k);margin:12px 0 10px}
.cgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.catb{background:#f8f8f8;border-radius:13px;padding:11px 5px;text-align:center;cursor:pointer;border:1.5px solid transparent;transition:.2s}
.catb.on{border-color:var(--c);background:rgba(0,200,215,.06)}
.catic{font-size:21px;margin-bottom:3px}
.catlb{font-size:9px;font-weight:700;color:var(--m)}
.pc{background:#fff;border-radius:15px;border:1px solid var(--b);padding:13px;margin-bottom:9px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:border-color .2s}
.pc:active{border-color:var(--c)}
.pcav{width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,var(--c),#0080aa);display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0;color:#fff;font-weight:800}
.pcinfo{flex:1}
.pcname{font-weight:700;font-size:13px}
.pccat{font-size:11px;color:var(--m)}
.pckr{font-size:11px;color:#F59E0B;font-weight:600}
.pcr{text-align:right}
.pcprice{font-weight:800;font-size:13px}
.pcdist{font-size:11px;color:var(--c)}
.shi{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #f5f5f5}
.shic{width:36px;height:36px;border-radius:11px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.shinfo{flex:1}.shtit{font-weight:700;font-size:13px}.shsub{font-size:11px;color:var(--m)}.shval{font-weight:800;font-size:13px;color:var(--g)}
.phead{text-align:center;padding:18px 0 10px}
.pav{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,var(--c),#0080aa);margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;font-weight:800}
.pname{font-weight:800;font-size:17px}.pemail{font-size:11px;color:var(--m);margin-top:2px}
.prow{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f5f5f5}
.plbl{font-size:13px;color:var(--m)}.pval{font-size:13px;font-weight:700}
.blogout{width:100%;padding:12px;background:#fff;border:1.5px solid #e5e5e5;border-radius:13px;color:var(--r);font-weight:700;font-size:14px;cursor:pointer;margin-top:14px;font-family:inherit}

/* ── NAV ── */
#nav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:#fff;border-top:1px solid var(--b);padding:7px 0 max(18px,env(safe-area-inset-bottom,18px));display:flex;align-items:center;justify-content:space-around;height:78px}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;background:none;border:none;font-family:inherit;padding:4px 12px;border-radius:11px}
.niic{font-size:19px;line-height:1}.nilb{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--m)}
.ni.on .nilb{color:var(--c)}
.norb{width:54px;height:54px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#00ecf8,#009aaa);box-shadow:0 0 16px rgba(0,200,215,.5);border:none;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 14px rgba(0,200,215,.5)}50%{box-shadow:0 0 26px rgba(0,200,215,.8)}}

/* ── CHAT ── */
#chat{position:fixed;left:0;right:0;bottom:0;z-index:50;background:#fff;border-radius:26px 26px 0 0;box-shadow:0 -4px 28px rgba(0,0,0,.13);height:0;overflow:hidden;transition:height .35s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column}
.ctop{padding:12px 16px 10px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:10px;flex-shrink:0}
.corb{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#00ecf8,#009aaa);display:flex;align-items:center;justify-content:center;font-size:17px}
.ctitle{flex:1}.ctit{font-weight:800;font-size:14px}.cst{font-size:10px;color:var(--g);font-weight:600}
.cclose{background:none;border:none;font-size:22px;cursor:pointer;color:#ccc;padding:4px}
#cmsgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:9px;min-height:0}
.msg{max-width:83%;padding:9px 13px;border-radius:17px;font-size:13.5px;line-height:1.5;word-break:break-word}
.mh{background:linear-gradient(135deg,rgba(0,200,215,.1),rgba(0,200,215,.04));align-self:flex-start;border-radius:4px 17px 17px 17px;color:var(--k)}
.mu{background:#111;color:#fff;align-self:flex-end;border-radius:17px 17px 4px 17px}
.mtyp{align-self:flex-start;padding:10px 14px;background:rgba(0,0,0,.04);border-radius:4px 17px 17px 17px}
.td{display:inline-block;width:6px;height:6px;border-radius:50%;background:#bbb;animation:td 1.2s infinite;margin:0 2px}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes td{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
#csugs{display:flex;flex-wrap:wrap;gap:6px;padding:7px 12px;border-top:1px solid #f5f5f5;flex-shrink:0}
.csug{padding:6px 13px;border-radius:19px;border:1.5px solid #e5e5e5;background:#fff;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:.15s}
.csug:active{border-color:var(--c)}
#cinrow{display:flex;gap:7px;padding:9px 12px max(22px,env(safe-area-inset-bottom,22px));border-top:1px solid #f0f0f0;flex-shrink:0;background:#fff}
#cin{flex:1;padding:10px 15px;border:1.5px solid #e5e5e5;border-radius:22px;font-size:14px;font-family:inherit;outline:none;transition:.2s}
#cin:focus{border-color:var(--c)}
#csend{width:38px;height:38px;border-radius:50%;background:#111;border:none;color:#fff;font-size:17px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}

/* ── UTILS ── */
#toast{position:fixed;top:max(56px,env(safe-area-inset-top,56px));left:50%;transform:translateX(-50%) translateY(-80px);z-index:99;background:#111;color:#fff;padding:9px 18px;border-radius:18px;font-size:12px;font-weight:600;white-space:nowrap;transition:transform .3s}
#toast.show{transform:translateX(-50%) translateY(0)}
.hide{display:none!important}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
<div class="abox">
  <div class="alogo">U<b>.</b>GO</div>
  <div class="asub">Servicios del hogar en minutos</div>
  <div class="atabs">
    <div class="atab on" onclick="sw('log')">Ingresar</div>
    <div class="atab" onclick="sw('reg')">Registrarse</div>
  </div>
  <div id="vlog" class="aform on">
    <div class="afl"><label for="le">Email</label><input id="le" type="email" placeholder="tu@email.com" autocomplete="email"></div>
    <div class="afl"><label for="lp">Contraseña</label><input id="lp" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="abtn" onclick="doLogin()">Ingresar →</button>
    <div class="aor">o continuá con</div>
    <button class="agbtn" onclick="signInGoogle()">
      <svg width="17" height="17" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z"/></svg>
      Continuar con Google
    </button>
    <div id="aerr"></div>
  </div>
  <div id="vreg" class="aform">
    <div class="afl"><label for="rn">Nombre completo</label><input id="rn" type="text" placeholder="María López" autocomplete="name"></div>
    <div class="afl"><label for="re">Email</label><input id="re" type="email" placeholder="tu@email.com" autocomplete="email"></div>
    <div class="afl"><label for="rp">Contraseña</label><input id="rp" type="password" placeholder="mínimo 6 caracteres" autocomplete="new-password"></div>
    <button class="abtn" onclick="doRegister()">Crear cuenta →</button>
    <div class="aor">o continuá con</div>
    <button class="agbtn" onclick="signInGoogle()">
      <svg width="17" height="17" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z"/></svg>
      Continuar con Google
    </button>
    <div id="aerr2"></div>
  </div>
</div>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- TOP -->
<div id="top" class="hide">
  <div><div class="tlogo">U<span>.</span>GO</div><div class="tsub" id="cname">Cliente</div></div>
  <div class="lchip" id="lchip">📍 Florianópolis</div>
</div>

<!-- SHEET -->
<div id="sheet"><div class="shandle"></div><div id="sb"></div></div>

<!-- CHAT -->
<div id="chat">
  <div class="ctop">
    <div class="corb">🌀</div>
    <div class="ctitle"><div class="ctit">Hugo</div><div class="cst">● Tu asistente personal</div></div>
    <button class="cclose" onclick="closeChat()">✕</button>
  </div>
  <div id="cmsgs"></div>
  <div id="csugs"></div>
  <div id="cinrow">
    <input id="cin" placeholder="¿Qué servicio necesitás?" onkeydown="if(event.key==='Enter')sendChat()">
    <button id="csend" onclick="sendChat()">↑</button>
  </div>
</div>

<!-- NAV -->
<nav id="nav" class="hide">
  <button class="ni on" id="ni-home" onclick="nav2('home')"><div class="niic">🗺</div><div class="nilb">Inicio</div></button>
  <button class="ni" id="ni-svcs" onclick="nav2('svcs')"><div class="niic">🔧</div><div class="nilb">Servicios</div></button>
  <div class="ni" onclick="openChat()"><button class="norb">🌀</button></div>
  <button class="ni" id="ni-hist" onclick="nav2('hist')"><div class="niic">📋</div><div class="nilb">Historial</div></button>
  <button class="ni" id="ni-prof" onclick="nav2('prof')"><div class="niic">👤</div><div class="nilb">Perfil</div></button>
</nav>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SB_URL='https://byajcqrgetloavrgyqak.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ5YWpjcXJnZXRsb2F2cmd5cWFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NzA5NTMsImV4cCI6MjA5NzA0Njk1M30.vkeb10BBuu06mOrMdOw1K3SBhTbl02KbOUp6lSOhRDs';
const sb=supabase.createClient(SB_URL,SB_KEY,{auth:{detectSessionInUrl:true,persistSession:true,autoRefreshToken:true,flowType:'implicit'}});

let SESSION=null,CLI=null,MAP=null,myLat=-27.5969,myLng=-48.5495,chatHistory=[];

const CATS=[{ic:'⚡',lb:'Electricista'},{ic:'🔧',lb:'Plomero'},{ic:'🧹',lb:'Limpieza'},{ic:'🎨',lb:'Pintor'},{ic:'🪚',lb:'Carpintero'},{ic:'🔑',lb:'Cerrajero'},{ic:'🌿',lb:'Jardinero'},{ic:'❄️',lb:'AC/Clima'}];

/* ── UTILS ── */
function showErr(m){const e=document.getElementById('aerr');if(!e)return;e.textContent=m;e.style.display='block';}
function showErr2(m){const e=document.getElementById('aerr2');if(!e)return;e.textContent=m;e.style.display='block';}
function clearErrs(){['aerr','aerr2'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none';});}
function toast(m,d=2500){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}
function sw(v){
  ['vlog','vreg'].forEach((id,i)=>document.getElementById(id).classList.toggle('on',i===(v==='log'?0:1)));
  document.querySelectorAll('.atab').forEach((t,i)=>t.classList.toggle('on',i===(v==='log'?0:1)));
  clearErrs();
}

/* ── AUTH ── */
async function signInGoogle(){
  clearErrs();
  const {error}=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:'https://ugo-admin-panel.vercel.app/client.html'}});
  if(error) showErr('Google: '+error.message);
}
async function doLogin(){
  clearErrs();
  const email=document.getElementById('le').value.trim();
  const pass=document.getElementById('lp').value;
  if(!email||!pass){showErr('Completá email y contraseña');return;}
  const btn=document.querySelector('#vlog .abtn');
  if(btn){btn.textContent='Ingresando...';btn.disabled=true;}
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(btn){btn.textContent='Ingresar →';btn.disabled=false;}
  if(error){showErr(error.message.includes('Invalid')||error.message.includes('invalid')?'Email o contraseña incorrectos':error.message);return;}
  if(data.session){SESSION=data.session;await bootApp();}
}
async function doRegister(){
  clearErrs();
  const nombre=document.getElementById('rn').value.trim();
  const email=document.getElementById('re').value.trim();
  const pass=document.getElementById('rp').value;
  if(!nombre||!email||!pass){showErr2('Completá todos los campos');return;}
  if(pass.length<6){showErr2('La contraseña debe tener al menos 6 caracteres');return;}
  const btn=document.querySelector('#vreg .abtn');
  if(btn){btn.textContent='Creando...';btn.disabled=true;}
  const {data,error}=await sb.auth.signUp({email,password:pass,options:{data:{nombre,tipo:'cliente'}}});
  if(btn){btn.textContent='Crear cuenta →';btn.disabled=false;}
  if(error){showErr2(error.message);return;}
  if(data.user){
    await sb.from('usuarios').upsert({id:data.user.id,auth_id:data.user.id,email,nombre,tipo:'cliente',activo:true,karma:5.0},{onConflict:'id'});
    toast('¡Cuenta creada! Iniciando...');
    if(data.session){SESSION=data.session;await bootApp();}
  }
}
async function doLogout(){
  await sb.auth.signOut();SESSION=null;CLI=null;
  document.getElementById('auth').classList.remove('hide');
  document.getElementById('top').classList.add('hide');
  document.getElementById('nav').classList.add('hide');
  document.getElementById('sheet').style.height='0';
  document.getElementById('chat').style.height='0';
}

/* ── SESSION ── */
(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(session){SESSION=session;await bootApp();}
})();
sb.auth.onAuthStateChange(async(ev,ses)=>{
  if(ev==='SIGNED_IN'&&ses&&!SESSION){SESSION=ses;await bootApp();}
  if(ev==='SIGNED_OUT'){SESSION=null;}
});

/* ── BOOT ── */
async function bootApp(){
  try{
    document.getElementById('auth').classList.add('hide');
    document.getElementById('top').classList.remove('hide');
    document.getElementById('nav').classList.remove('hide');
    await loadCli();
    initMap();
    startGPS();
    nav2('home');
  }catch(e){console.error('bootApp:',e);toast('Error al cargar. Recargá la página.');}
}

/* ── LOAD CLIENT ── */
async function loadCli(){
  const uid=SESSION.user.id;
  const {data}=await sb.from('usuarios').select('*').eq('id',uid).maybeSingle();
  if(data){CLI=data;document.getElementById('cname').textContent=data.nombre||SESSION.user.email;}
  else{
    const meta=SESSION.user.user_metadata||{};
    const nombre=meta.nombre||meta.full_name||meta.name||SESSION.user.email.split('@')[0];
    await sb.from('usuarios').upsert({id:uid,auth_id:uid,email:SESSION.user.email,nombre,tipo:'cliente',activo:true,karma:5.0},{onConflict:'id'});
    CLI={nombre};
    document.getElementById('cname').textContent=nombre;
  }
}

/* ── MAP ── */
function initMap(){
  if(MAP)return;
  MAP=L.map('map',{zoomControl:false,attributionControl:false}).setView([myLat,myLng],14);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(MAP);
  loadProviders();
}
function startGPS(){
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(pos=>{
    myLat=pos.coords.latitude;myLng=pos.coords.longitude;
    if(MAP)MAP.setView([myLat,myLng],15);
    // Blue dot
    L.circleMarker([myLat,myLng],{radius:8,fillColor:'#00C8D7',color:'#fff',weight:3,opacity:1,fillOpacity:1}).addTo(MAP);
    // Geocode
    fetch(`https://nominatim.openstreetmap.org/reverse?lat=${myLat}&lon=${myLng}&format=json`)
      .then(r=>r.json()).then(d=>{
        const loc=d.address?.suburb||d.address?.neighbourhood||d.address?.city||'Mi ubicación';
        document.getElementById('lchip').textContent='📍 '+loc;
      }).catch(()=>{});
  },{enableHighAccuracy:true,timeout:8000});
}
async function loadProviders(){
  const icons={Electricista:'⚡',Plomero:'🔧',Limpieza:'🧹',Pintor:'🎨',Carpintero:'🪚',Cerrajero:'🔑',Jardinero:'🌿'};
  const {data}=await sb.from('usuarios').select('nombre,categoria,karma,lat,lng').eq('tipo','proveedor').eq('activo',true).not('lat','is',null).limit(20);
  const reales=(data||[]).filter(p=>p.lat&&p.lng);
  // Add simulated if < 3
  const sim=[
    {nombre:'Carlos R.',categoria:'Electricista',karma:4.8,lat:myLat+.013,lng:myLng+.009},
    {nombre:'Ana M.',categoria:'Limpieza',karma:4.9,lat:myLat-.007,lng:myLng+.013},
    {nombre:'Pedro S.',categoria:'Plomero',karma:4.7,lat:myLat+.006,lng:myLng-.011},
    {nombre:'Luis T.',categoria:'Pintor',karma:4.6,lat:myLat-.012,lng:myLng-.007},
    {nombre:'Julia F.',categoria:'Jardinero',karma:5.0,lat:myLat+.009,lng:myLng+.018}
  ];
  const provs=[...reales,...(reales.length<3?sim:[])];
  provs.forEach(p=>{
    const ic=icons[p.categoria]||'🔧';
    const html=`<div style="background:#fff;border-radius:11px;padding:4px 9px 4px 5px;box-shadow:0 2px 10px rgba(0,0,0,.14);display:flex;align-items:center;gap:4px;white-space:nowrap;border:1.5px solid rgba(0,200,215,.2)"><span style="font-size:15px">${ic}</span><span style="font-size:11px;font-weight:700">${p.nombre?.split(' ')[0]||'Prov.'}</span><span style="font-size:10px;color:#F59E0B;font-weight:600">★${(p.karma||5).toFixed(1)}</span></div>`;
    const icon=L.divIcon({className:'',html,iconSize:[null,null],iconAnchor:[40,20]});
    L.marker([p.lat,p.lng],{icon}).addTo(MAP).on('click',()=>{toast(`${p.nombre} · ${p.categoria} · ★${(p.karma||5).toFixed(1)}`);openChat();});
  });
}

/* ── NAV ── */
function nav2(sec){
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
  const el=document.getElementById('ni-'+sec);if(el)el.classList.add('on');
  const sh=document.getElementById('sheet');
  if(sec==='home'){sh.style.height='0';return;}
  sh.style.height='min(75vh,640px)';
  const map={svcs:svcsHTML,hist:histHTML,prof:profHTML};
  if(map[sec]){document.getElementById('sb').innerHTML=map[sec]();if(sec==='hist')loadHist();}
}

function svcsHTML(){
  return`<div class="pad"><div class="stt">🔧 ¿Qué necesitás?</div><div class="cgrid">${CATS.map(c=>`<div class="catb" onclick="selCat('${c.lb}',this)"><div class="catic">${c.ic}</div><div class="catlb">${c.lb}</div></div>`).join('')}</div><div id="plist"><p style="color:var(--m);font-size:13px">Seleccioná un servicio para ver proveedores disponibles.</p></div></div>`;
}
async function selCat(cat,el){
  document.querySelectorAll('.catb').forEach(b=>b.classList.remove('on'));el.classList.add('on');
  const pl=document.getElementById('plist');
  pl.innerHTML='<p style="color:var(--m);font-size:13px">Buscando...</p>';
  const {data}=await sb.from('usuarios').select('*').eq('tipo','proveedor').eq('categoria',cat).eq('activo',true).limit(6);
  if(!data?.length){pl.innerHTML='<p style="color:var(--m);font-size:13px">Sin proveedores disponibles ahora. Hugo puede buscarte opciones.</p>';return;}
  pl.innerHTML=data.map(p=>`<div class="pc" onclick="openChat()"><div class="pcav">${p.nombre?.[0]?.toUpperCase()||'🔧'}</div><div class="pcinfo"><div class="pcname">${p.nombre}</div><div class="pccat">${p.categoria} <span class="pckr">★${(p.karma||5).toFixed(1)}</span></div></div><div class="pcr"><div class="pcprice">R$${80+Math.floor(Math.random()*80)}</div><div class="pcdist">${(Math.random()*5+.5).toFixed(1)} km</div></div></div>`).join('');
}
function histHTML(){return`<div class="pad"><div class="stt">📋 Historial</div><div id="hlist"><p style="color:var(--m);font-size:13px">Cargando...</p></div></div>`;}
async function loadHist(){
  const {data}=await sb.from('servicios').select('*').eq('cliente_id',SESSION.user.id).order('created_at',{ascending:false}).limit(20);
  const el=document.getElementById('hlist');if(!el)return;
  if(!data?.length){el.innerHTML='<p style="color:var(--m);font-size:13px">Sin servicios aún.</p>';return;}
  el.innerHTML=data.map(s=>`<div class="shi"><div class="shic">🔧</div><div class="shinfo"><div class="shtit">${s.categoria||'Servicio'}</div><div class="shsub">${new Date(s.created_at).toLocaleDateString()}</div></div><div class="shval">R$${s.tarifa||0}</div></div>`).join('');
}
function profHTML(){
  const n=CLI?.nombre||SESSION?.user?.email?.split('@')[0]||'Usuario';
  return`<div class="pad"><div class="phead"><div class="pav">${n[0]?.toUpperCase()}</div><div class="pname">${n}</div><div class="pemail">${SESSION?.user?.email||''}</div></div><div class="prow"><span class="plbl">Tipo</span><span class="pval">Cliente</span></div><div class="prow"><span class="plbl">Karma</span><span class="pval">★${(CLI?.karma||5).toFixed(1)}</span></div><button class="blogout" onclick="doLogout()">Cerrar sesión</button></div>`;
}

/* ── HUGO CHAT (GEMINI) ── */
const HSUGS=['Necesito un electricista','¿Cuánto cuesta la limpieza?','Quiero ver proveedores cercanos','Estado de mi pedido','Reportar un problema'];

function openChat(){
  document.getElementById('chat').style.height='min(88vh,720px)';
  showSugs(HSUGS);
  if(!chatHistory.length)hugoCall('__INICIO__');
}
function closeChat(){document.getElementById('chat').style.height='0';}
function showSugs(list){document.getElementById('csugs').innerHTML=list.map(s=>`<button class="csug" onclick="sendSug('${s.replace(/'/g,"\\'")}')">${s}</button>`).join('');}
function addMsg(role,text){
  const d=document.getElementById('cmsgs');
  const el=document.createElement('div');
  el.className='msg '+(role==='u'?'mu':'mh');
  el.textContent=text;
  d.appendChild(el);
  requestAnimationFrame(()=>{d.scrollTop=d.scrollHeight;});
}
function showTyp(on){
  const ex=document.getElementById('mtyp');
  if(on&&!ex){
    const t=document.createElement('div');t.id='mtyp';t.className='mtyp';
    t.innerHTML='<span class="td"></span><span class="td"></span><span class="td"></span>';
    document.getElementById('cmsgs').appendChild(t);
    document.getElementById('cmsgs').scrollTop=99999;
  } else if(!on&&ex) ex.remove();
}
async function hugoCall(msg){
  showTyp(true);
  const ctx=[CLI?`Cliente:${CLI.nombre}`:'',`Ubicacion:${myLat.toFixed(4)},${myLng.toFixed(4)}`].filter(Boolean).join(' | ');
  try{
    const r=await fetch('/api/hugo/chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({role:'cliente',message:msg,context:ctx,history:chatHistory.slice(-8)})});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    showTyp(false);
    const reply=d.hugo_mensaje||'Sin respuesta de Hugo.';
    addMsg('h',reply);
    chatHistory.push({role:'assistant',content:reply});
  }catch(e){
    showTyp(false);
    addMsg('h','⚠️ Error al conectar con Hugo: '+e.message);
  }
}
async function sendChat(){
  const inp=document.getElementById('cin');
  const msg=inp.value.trim();if(!msg)return;
  inp.value='';addMsg('u',msg);
  chatHistory.push({role:'user',content:msg});
  showSugs([]);
  await hugoCall(msg);
  showSugs(HSUGS);
}
function sendSug(s){
  addMsg('u',s);chatHistory.push({role:'user',content:s});
  showSugs([]);
  hugoCall(s).then(()=>showSugs(HSUGS));
}
