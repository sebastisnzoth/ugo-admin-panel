<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>U.GO Proveedor</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --c: #00f2ff; --bg: #0a0a0a; --card: #1a1a2e; --text: #fff; --m: #888; }
    body { font-family: Inter, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .container { max-width: 600px; margin: 0 auto; padding: 16px; }
    .auth-screen { display: flex; flex-direction: column; gap: 20px; padding: 40px 20px; text-align: center; }
    .logo { font-size: 48px; margin-bottom: 20px; }
    .title { font-size: 24px; font-weight: 900; margin-bottom: 8px; }
    .subtitle { font-size: 12px; color: var(--m); margin-bottom: 40px; }
    .form-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
    input, select { padding: 12px; background: var(--card); border: 1px solid #333; color: var(--text); border-radius: 8px; font-family: inherit; }
    input:focus { outline: none; border-color: var(--c); }
    .btn { padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn-primary { background: var(--c); color: #000; }
    .btn-secondary { background: var(--card); border: 1px solid #333; color: var(--text); }
    .btn:hover { opacity: 0.9; }
    .error { color: #ff4444; font-size: 12px; margin-top: 8px; }
    .hide { display: none !important; }
    .main-content { display: flex; flex-direction: column; gap: 20px; }
    .nav { display: flex; gap: 12px; padding: 16px 0; border-bottom: 1px solid #333; overflow-x: auto; }
    .nav-btn { padding: 8px 16px; background: transparent; border: 1px solid #333; color: var(--text); border-radius: 6px; cursor: pointer; white-space: nowrap; }
    .nav-btn.active { border-color: var(--c); color: var(--c); }
    .section { display: none; }
    .section.active { display: block; }
    .card { background: var(--card); border: 1px solid #333; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .kpi { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
    .kpi-card { background: linear-gradient(135deg, var(--c) 0%, #0099cc 100%); color: #000; padding: 16px; border-radius: 12px; text-align: center; }
    .kpi-value { font-size: 20px; font-weight: 900; }
    .kpi-label { font-size: 11px; margin-top: 4px; opacity: 0.8; }
  </style>
</head>
<body>
  <!-- AUTH -->
  <div id="auth" class="auth-screen">
    <div class="logo">🔧</div>
    <div>
      <div class="title">U.GO Proveedor</div>
      <div class="subtitle">Inicia sesión o crea tu cuenta</div>
    </div>
    
    <div id="login-form">
      <div class="form-group">
        <input id="email" type="email" placeholder="Email">
        <input id="password" type="password" placeholder="Contraseña">
      </div>
      <button class="btn btn-primary" onclick="login()">Ingresar</button>
      <button class="btn btn-secondary" onclick="toggleRegister()">Crear cuenta</button>
      <div id="login-error" class="error"></div>
    </div>

    <div id="register-form" class="hide">
      <div class="form-group">
        <input id="reg-name" type="text" placeholder="Tu nombre">
        <select id="reg-cat">
          <option value="">Selecciona categoría</option>
          <option value="Plomero">Plomero</option>
          <option value="Electricista">Electricista</option>
          <option value="Carpintero">Carpintero</option>
        </select>
        <input id="reg-email" type="email" placeholder="Email">
        <input id="reg-password" type="password" placeholder="Contraseña">
      </div>
      <button class="btn btn-primary" onclick="register()">Crear cuenta</button>
      <button class="btn btn-secondary" onclick="toggleRegister()">Volver</button>
      <div id="register-error" class="error"></div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="main" class="hide container">
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 style="font-size: 20px; margin-bottom: 4px;">🔧 U.GO</h1>
      <p style="font-size: 12px; color: var(--m);">Bienvenido, <span id="user-name">Proveedor</span></p>
    </div>

    <div class="nav">
      <button class="nav-btn active" onclick="switchTab('home')">🏠 Inicio</button>
      <button class="nav-btn" onclick="switchTab('pedidos')">📋 Pedidos</button>
      <button class="nav-btn" onclick="switchTab('ganancias')">📊 Ganancias</button>
      <button class="nav-btn" onclick="switchTab('perfil')">👤 Perfil</button>
      <button class="nav-btn" onclick="logout()">🚪 Salir</button>
    </div>

    <!-- HOME -->
    <div id="home" class="section active">
      <div class="kpi">
        <div class="kpi-card">
          <div class="kpi-value" id="today-earnings">R$ 0</div>
          <div class="kpi-label">Hoy</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value" id="month-services">0</div>
          <div class="kpi-label">Servicios</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value" id="rating">⭐ 5.0</div>
          <div class="kpi-label">Rating</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value" id="status">🟢 Online</div>
          <div class="kpi-label">Estado</div>
        </div>
      </div>
      <div id="job-alert" class="hide card" style="background: #ff6b00; border-color: #ff8c00;">
        <div style="font-weight: 700; margin-bottom: 12px;">🟠 NUEVO PEDIDO</div>
        <div id="job-details" style="font-size: 13px; line-height: 1.6; margin-bottom: 12px;"></div>
        <div style="display: flex; gap: 8px;">
          <button class="btn btn-primary" onclick="acceptJob()" style="flex: 1;">✅ Aceptar</button>
          <button class="btn btn-secondary" onclick="rejectJob()" style="flex: 1;">❌ Rechazar</button>
        </div>
      </div>
    </div>

    <!-- PEDIDOS -->
    <div id="pedidos" class="section">
      <div id="pedidos-list"></div>
    </div>

    <!-- GANANCIAS -->
    <div id="ganancias" class="section">
      <div class="card">
        <div style="font-size: 12px; color: var(--m); margin-bottom: 8px;">GANANCIAS ESTE MES</div>
        <div style="font-size: 28px; font-weight: 900; color: var(--c); margin-bottom: 20px;">R$ <span id="total-earnings">0</span></div>
        <button class="btn btn-primary" onclick="requestWithdrawal()" style="width: 100%;">💰 Solicitar Retiro</button>
      </div>
      <div id="retiros-list" style="margin-top: 20px;"></div>
    </div>

    <!-- PERFIL -->
    <div id="perfil" class="section">
      <div class="card">
        <div style="font-size: 12px; color: var(--m); margin-bottom: 12px;">MI PERFIL</div>
        <div style="margin-bottom: 16px;">
          <label style="font-size: 12px; color: var(--m);">Nombre:</label>
          <div style="font-weight: 700;" id="prof-name">-</div>
        </div>
        <div style="margin-bottom: 16px;">
          <label style="font-size: 12px; color: var(--m);">Categoría:</label>
          <div style="font-weight: 700;" id="prof-cat">-</div>
        </div>
        <div style="margin-bottom: 16px;">
          <label style="font-size: 12px; color: var(--m);">Email:</label>
          <div style="font-weight: 700; font-size: 13px;" id="prof-email">-</div>
        </div>
        <button class="btn btn-secondary" onclick="logout()" style="width: 100%;">Cerrar sesión</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SB_URL = 'https://byajcqrgetloavrgyqak.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ5YWpjcXJnZXRsb2F2cmd5cWFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NzA5NTMsImV4cCI6MjA5NzA0Njk1M30.vkeb10BBuu06mOrMdOw1K3SBhTbl02KbOUp6lSOhRDs';
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let session = null;
    let provider = null;

    // INIT
    window.addEventListener('load', async () => {
      const { data: { session: s } } = await sb.auth.getSession();
      if (s) {
        session = s;
        await loadProvider();
        showMain();
      }
    });

    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      if (!email || !password) {
        document.getElementById('login-error').textContent = 'Completa email y contraseña';
        return;
      }
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        document.getElementById('login-error').textContent = 'Error: ' + error.message;
        return;
      }
      if (data.session) {
        session = data.session;
        await loadProvider();
        showMain();
      }
    }

    async function register() {
      const name = document.getElementById('reg-name').value;
      const cat = document.getElementById('reg-cat').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      if (!name || !cat || !email || !password) {
        document.getElementById('register-error').textContent = 'Completa todos los campos';
        return;
      }
      const { data, error } = await sb.auth.signUp({ email, password, options: { data: { nombre: name, tipo: 'proveedor', categoria: cat } } });
      if (error) {
        document.getElementById('register-error').textContent = 'Error: ' + error.message;
        return;
      }
      if (data.user) {
        try {
          await sb.from('usuarios').upsert({ id: data.user.id, auth_id: data.user.id, email, nombre: name, tipo: 'proveedor', categoria: cat, activo: true, karma: 5.0 }, { onConflict: 'id' });
        } catch (e) { console.log('Profile insert error (may be RLS):', e); }
        if (data.session) {
          session = data.session;
          await loadProvider();
          showMain();
        } else {
          document.getElementById('register-error').textContent = 'Cuenta creada. Inicia sesión.';
          toggleRegister();
        }
      }
    }

    async function loadProvider() {
      const { data } = await sb.from('usuarios').select('*').eq('id', session.user.id).single();
      if (data) {
        provider = data;
        document.getElementById('user-name').textContent = data.nombre || 'Proveedor';
        document.getElementById('prof-name').textContent = data.nombre || '-';
        document.getElementById('prof-cat').textContent = data.categoria || '-';
        document.getElementById('prof-email').textContent = data.email || '-';
        document.getElementById('rating').textContent = '⭐ ' + (data.karma || 5).toFixed(1);
      }
    }

    async function logout() {
      await sb.auth.signOut();
      session = null;
      provider = null;
      document.getElementById('auth').classList.remove('hide');
      document.getElementById('main').classList.add('hide');
      document.getElementById('email').value = '';
      document.getElementById('password').value = '';
    }

    function showMain() {
      document.getElementById('auth').classList.add('hide');
      document.getElementById('main').classList.remove('hide');
    }

    function toggleRegister() {
      document.getElementById('login-form').classList.toggle('hide');
      document.getElementById('register-form').classList.toggle('hide');
    }

    function switchTab(tab) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      event.target.classList.add('active');
    }

    function acceptJob() { alert('Pedido aceptado'); }
    function rejectJob() { alert('Pedido rechazado'); }
    function requestWithdrawal() { alert('Solicitud de retiro enviada'); }
  </script>
</body>
</html>
