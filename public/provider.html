<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>U.GO Proveedor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:-apple-system,'Inter',sans-serif;background:#1a2030}
:root{--c:#00C8D7;--k:#111;--w:#fff;--g:#22C55E;--r:#EF4444;--o:#F59E0B;--m:#888;--b:#eee}

/* AUTH */
#auth{position:fixed;inset:0;z-index:100;background:linear-gradient(160deg,#08090d,#0d1117);display:flex;align-items:center;justify-content:center;padding:20px}
.abox{width:100%;max-width:360px}
.alogo{font-size:34px;font-weight:900;color:#fff;letter-spacing:-1px;margin-bottom:2px}.alogo b{color:var(--c)}
.asub{font-size:12px;color:#555;margin-bottom:28px}
.atabs{display:flex;background:rgba(255,255,255,.06);border-radius:12px;padding:3px;margin-bottom:18px}
.atab{flex:1;text-align:center;padding:8px;border-radius:9px;font-size:13px;font-weight:600;color:#555;cursor:pointer;transition:.2s}
.atab.on{background:rgba(255,255,255,.1);color:#fff}
.aform{display:none}.aform.on{display:block}
.afl{margin-bottom:11px}
.afl label{display:block;font-size:10px;font-weight:700;color:#555;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.afl input,.afl select{width:100%;padding:11px 13px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);border-radius:11px;color:#fff;font-size:14px;font-family:inherit;outline:none;transition:.2s;-webkit-appearance:none}
.afl input:focus,.afl select:focus{border-color:var(--c)}
.afl input::placeholder{color:#444}
.afl select option{background:#1a2030;color:#fff}
.abtn{width:100%;padding:13px;background:var(--c);color:#000;font-weight:800;font-size:14px;border:none;border-radius:13px;cursor:pointer;margin-top:4px;font-family:inherit;transition:.2s}
.abtn:active{opacity:.85}
.aor{text-align:center;color:#444;font-size:11px;margin:10px 0}
.agbtn{width:100%;padding:12px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);border-radius:13px;color:#fff;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
.agbtn:active{background:rgba(255,255,255,.14)}
#aerr,#aerr2{display:none;color:var(--r);font-size:12px;margin-top:8px;padding:8px 12px;background:rgba(239,68,68,.1);border-radius:8px}

/* MAP */
#map{position:fixed;inset:0;z-index:0}

/* TOP */
#top{position:fixed;top:0;left:0;right:0;z-index:20;padding:max(48px,env(safe-area-inset-top,48px)) 16px 12px;background:linear-gradient(to bottom,rgba(255,255,255,.97) 60%,transparent);display:flex;align-items:center;justify-content:space-between}
.tlogo{font-weight:900;font-size:20px;letter-spacing:-.5px;color:var(--k)}.tlogo span{color:var(--c)}
.tsub{font-size:11px;color:var(--m);margin-top:-1px}
#tog{display:flex;align-items:center;gap:7px;background:#fff;border-radius:20px;padding:7px 13px;box-shadow:0 2px 10px rgba(0,0,0,.12);cursor:pointer;border:none;font-family:inherit;transition:.25s}
#tog.on{background:#111}
.togdot{width:8px;height:8px;border-radius:50%;background:#ccc;transition:.25s}
#tog.on .togdot{background:var(--g);animation:bl 1.5s infinite}
.toglb{font-size:11px;font-weight:700;color:#888;transition:.25s}
#tog.on .toglb{color:#fff}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}

/* JOB NOTIFICATION */
#jobnot{position:fixed;left:12px;right:12px;bottom:90px;z-index:40;background:#fff;border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,.22);padding:16px;transform:translateY(220%);transition:transform .4s cubic-bezier(.32,.72,0,1)}
#jobnot.show{transform:translateY(0)}
.jnh{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.jnic{width:42px;height:42px;border-radius:12px;background:rgba(0,200,215,.1);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.jntit{font-weight:800;font-size:14px}.jnsub{font-size:12px;color:var(--m)}
.jnbar-bg{height:4px;background:#f0f0f0;border-radius:2px;margin-bottom:5px;overflow:hidden}
.jnbar{height:100%;background:var(--c);transition:width .1s linear}
.jnsecs{font-size:11px;font-weight:700;color:var(--m);text-align:center;margin-bottom:10px}
.jnbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.jnacc{padding:12px;background:#111;color:#fff;font-weight:700;font-size:13px;border:none;border-radius:12px;cursor:pointer;font-family:inherit}
.jnrej{padding:12px;background:#f5f5f5;color:var(--m);font-weight:700;font-size:13px;border:none;border-radius:12px;cursor:pointer;font-family:inherit}

/* ACTIVE JOB BAR */
#jobbar{position:fixed;left:0;right:0;bottom:78px;z-index:35;background:#111;color:#fff;padding:12px 16px;display:none;align-items:center;gap:12px}
#jobbar.show{display:flex}
.jbico{font-size:20px}
.jbinfo{flex:1}.jbtit{font-weight:700;font-size:13px}.jbsub{font-size:11px;color:#aaa}
.jbbtn{padding:8px 14px;background:var(--c);color:#000;font-weight:700;font-size:12px;border:none;border-radius:20px;cursor:pointer;font-family:inherit;white-space:nowrap}
.jbnav{padding:8px 14px;background:rgba(255,255,255,.15);color:#fff;font-weight:700;font-size:12px;border:none;border-radius:20px;cursor:pointer;font-family:inherit;white-space:nowrap}

/* SHEET */
#sheet{position:fixed;left:0;right:0;z-index:25;background:#fff;border-radius:24px 24px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.08);overflow:hidden;bottom:78px;height:0;transition:height .35s cubic-bezier(.32,.72,0,1)}
.shandle{width:32px;height:4px;background:#e5e5e5;border-radius:2px;margin:8px auto 6px}
#sb{height:calc(100% - 20px);overflow-y:auto;padding-bottom:20px}
.pad{padding:0 16px}
.stt{font-weight:800;font-size:16px;color:var(--k);margin:12px 0 10px}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.sstat{background:#f8f8f8;border-radius:12px;padding:13px;text-align:center}
.sval{font-size:22px;font-weight:900;color:var(--k)}.slbl{font-size:10px;color:var(--m);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.shi{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #f5f5f5}
.shic{width:36px;height:36px;border-radius:11px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.shinfo{flex:1}.shtit{font-weight:700;font-size:13px}.shsub{font-size:11px;color:var(--m)}.shval{font-weight:800;font-size:13px;color:var(--g)}
/* Profile */
.phead{text-align:center;padding:18px 0 10px}
.pav{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,var(--c),#0080aa);margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;font-weight:800}
.pname{font-weight:800;font-size:17px}.pkr{display:inline-flex;align-items:center;gap:4px;background:rgba(0,200,215,.1);color:var(--c);border-radius:20px;padding:3px 11px;font-size:11px;font-weight:700;margin-top:7px}
.pfield{margin-bottom:12px}
.pfield label{display:block;font-size:11px;font-weight:700;color:var(--m);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.pfield input,.pfield select{width:100%;padding:10px 13px;background:#f8f8f8;border:1.5px solid var(--b);border-radius:11px;font-size:14px;font-family:inherit;outline:none;color:var(--k);transition:.2s}
.pfield input:focus,.pfield select:focus{border-color:var(--c);background:#fff}
.psave{width:100%;padding:12px;background:#111;color:#fff;font-weight:700;font-size:14px;border:none;border-radius:13px;cursor:pointer;margin-top:4px;font-family:inherit}
.blogout{width:100%;padding:12px;background:#fff;border:1.5px solid #e5e5e5;border-radius:13px;color:var(--r);font-weight:700;font-size:14px;cursor:pointer;margin-top:10px;font-family:inherit}
/* Docs */
.doc-card{border:2px dashed var(--b);border-radius:16px;padding:20px;text-align:center;cursor:pointer;transition:.2s;margin-bottom:12px}
.doc-card:hover{border-color:var(--c);background:rgba(0,200,215,.03)}
.doc-card.uploaded{border-style:solid;border-color:var(--g);background:rgba(34,197,94,.05)}
.doc-ic{font-size:28px;margin-bottom:6px}
.doc-tit{font-weight:700;font-size:13px}
.doc-sub{font-size:11px;color:var(--m);margin-top:2px}
.doc-status{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-top:8px}
.ds-pen{background:rgba(245,158,11,.1);color:var(--o)}
.ds-ok{background:rgba(34,197,94,.1);color:var(--g)}
.ds-err{background:rgba(239,68,68,.1);color:var(--r)}

/* NAV */
#nav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:#fff;border-top:1px solid var(--b);padding:7px 0 max(18px,env(safe-area-inset-bottom,18px));display:flex;align-items:center;justify-content:space-around;height:78px}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;background:none;border:none;font-family:inherit;padding:4px 10px;border-radius:11px}
.niic{font-size:19px;line-height:1}.nilb{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--m)}
.ni.on .nilb{color:var(--c)}
.norb{width:54px;height:54px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#00ecf8,#009aaa);box-shadow:0 0 16px rgba(0,200,215,.5);border:none;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 14px rgba(0,200,215,.5)}50%{box-shadow:0 0 26px rgba(0,200,215,.8)}}

/* CHAT */
#chat{position:fixed;left:0;right:0;bottom:0;z-index:50;background:#fff;border-radius:26px 26px 0 0;box-shadow:0 -4px 28px rgba(0,0,0,.13);height:0;overflow:hidden;transition:height .35s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column}
.ctop{padding:12px 16px 10px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:10px;flex-shrink:0}
.corb{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#00ecf8,#009aaa);display:flex;align-items:center;justify-content:center;font-size:17px}
.ctitle{flex:1}.ctit{font-weight:800;font-size:14px}.cst{font-size:10px;color:var(--g);font-weight:600}
.cclose{background:none;border:none;font-size:22px;cursor:pointer;color:#ccc;padding:4px}
#cmsgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:9px;min-height:0}
.msg{max-width:83%;padding:9px 13px;border-radius:17px;font-size:13.5px;line-height:1.5;word-break:break-word}
.mh{background:linear-gradient(135deg,rgba(0,200,215,.1),rgba(0,200,215,.04));align-self:flex-start;border-radius:4px 17px 17px 17px;color:var(--k)}
.mu{background:#111;color:#fff;align-self:flex-end;border-radius:17px 17px 4px 17px}
.mtyp{align-self:flex-start;padding:10px 14px;background:rgba(0,0,0,.04);border-radius:4px 17px 17px 17px}
.td{display:inline-block;width:6px;height:6px;border-radius:50%;background:#bbb;animation:td 1.2s infinite;margin:0 2px}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes td{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
#csugs{display:flex;flex-wrap:wrap;gap:6px;padding:7px 12px;border-top:1px solid #f5f5f5;flex-shrink:0}
.csug{padding:6px 13px;border-radius:19px;border:1.5px solid #e5e5e5;background:#fff;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:.15s}
.csug:active{border-color:var(--c)}
#cinrow{display:flex;gap:7px;padding:9px 12px max(22px,env(safe-area-inset-bottom,22px));border-top:1px solid #f0f0f0;flex-shrink:0;background:#fff}
#cin{flex:1;padding:10px 15px;border:1.5px solid #e5e5e5;border-radius:22px;font-size:14px;font-family:inherit;outline:none;transition:.2s}
#cin:focus{border-color:var(--c)}
#csend{width:38px;height:38px;border-radius:50%;background:#111;border:none;color:#fff;font-size:17px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}

#toast{position:fixed;top:max(56px,env(safe-area-inset-top,56px));left:50%;transform:translateX(-50%) translateY(-80px);z-index:99;background:#111;color:#fff;padding:9px 18px;border-radius:18px;font-size:12px;font-weight:600;white-space:nowrap;transition:transform .3s;max-width:80%;text-align:center}
#toast.show{transform:translateX(-50%) translateY(0)}
.hide{display:none!important}
</style>
</head>
<body>

<!-- AUTH -->

<div class="abox">
  <div class="alogo">U<b>.</b>GO</div>

  </div>
</div>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- TOP -->
<div id="top" class="hide">
  <div><div class="tlogo">U<span>.</span>GO</div><div class="tsub" id="pname">Cargando...</div></div>
  <button id="tog" onclick="toggleOnline()"><div class="togdot"></div><div class="toglb" id="toglb">OFFLINE</div></button>
</div>

<!-- JOB INCOMING -->
<div id="jobnot">
  <div class="jnh"><div class="jnic" id="jnic">⚡</div><div><div class="jntit" id="jtit">Nuevo pedido</div><div class="jnsub" id="jsub">2.3km · R$120</div></div></div>

<!-- ACTIVE JOB BAR -->
<div id="jobbar">
  <div class="jbico" id="jbico">🔧</div>
  <div class="jbinfo"><div class="jbtit" id="jbtit">Trabajo activo</div><div class="jbsub" id="jbsub">En camino...</div></div>
  <button class="jbnav" id="jbnav" onclick="navigateJob()">🗺 Navegar</button>

</div>

<!-- SHEET -->

<!-- CHAT -->

</nav>

/* ── UTILS ── */
const $=id=>document.getElementById(id);
function showErr(m){const e=$('aerr');if(!e)return;e.textContent=m;e.style.display='block';}
function showErr2(m){const e=$('aerr2');if(!e)return;e.textContent=m;e.style.display='block';}
function clearErrs(){['aerr','aerr2'].forEach(id=>{const e=$(id);if(e)e.style.display='none';});}
function toast(m,d=2800){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}
function sw(v){
  ['vlog','vreg'].forEach((id,i)=>$(id).classList.toggle('on',i===(v==='log'?0:1)));
  document.querySelectorAll('.atab').forEach((t,i)=>t.classList.toggle('on',i===(v==='log'?0:1)));
  clearErrs();
}

/* ── AUTH ── */
async function signInGoogle(){
  clearErrs();
  const{error}=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:'https://ugo-admin-panel.vercel.app/provider.html'}});
  if(error)showErr('Google: '+error.message);
}
async function doLogin(){
  clearErrs();
  const email=$('le').value.trim(),pass=$('lp').value;
  if(!email||!pass){showErr('Completá email y contraseña');return;}
  const btn=document.querySelector('#vlog .abtn');
  if(btn){btn.textContent='Ingresando...';btn.disabled=true;}
  const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(btn){btn.textContent='Ingresar →';btn.disabled=false;}
  if(error){showErr(error.message.includes('Invalid')||error.message.includes('invalid')?'Email o contraseña incorrectos':error.message);return;}
  if(data.session){SESSION=data.session;await bootApp();}
}
async function doRegister(){
  clearErrs();
  const nombre=$('rn').value.trim(),cat=$('rcat').value,email=$('re').value.trim(),pass=$('rp').value;
  if(!nombre||!email||!pass){showErr2('Completá todos los campos');return;}
  if(pass.length<6){showErr2('Contraseña mínimo 6 caracteres');return;}
  const btn=document.querySelector('#vreg .abtn');
  if(btn){btn.textContent='Creando...';btn.disabled=true;}
  const{data,error}=await sb.auth.signUp({email,password:pass,options:{data:{nombre,tipo:'proveedor',categoria:cat}}});
  if(btn){btn.textContent='Crear cuenta →';btn.disabled=false;}
  if(error){showErr2(error.message);return;}
  if(data.user){
    await sb.from('usuarios').upsert({id:data.user.id,auth_id:data.user.id,email,nombre,tipo:'proveedor',categoria:cat,activo:true,karma:5.0},{onConflict:'id'});
    if(data.session){SESSION=data.session;await bootApp();}else toast('¡Cuenta creada! Iniciá sesión.');
  }
}
async function doLogout(){
  await sb.auth.signOut();SESSION=null;PROV=null;isOnline=false;
  $('auth').classList.remove('hide');$('top').classList.add('hide');$('nav').classList.add('hide');
  $('sheet').style.height='0';$('chat').style.height='0';$('jobbar').classList.remove('show');
}

/* ── SESSION ── */
(async()=>{const{data:{session}}=await sb.auth.getSession();if(session){SESSION=session;await bootApp();}})();

  if(ev==='SIGNED_IN'&&ses&&!SESSION){SESSION=ses;await bootApp();}

/* ── BOOT ── */
async function bootApp(){
  try{
    $('auth').classList.add('hide');$('top').classList.remove('hide');$('nav').classList.remove('hide');
    await loadProv();initMap();startGPS();nav2('home');
  }catch(e){console.error('boot:',e);toast('Error al cargar. Recargá la página.');}
}

/* ── PROVIDER DATA ── */
async function loadProv(){
  const uid=SESSION.user.id;
  const{data}=await sb.from('usuarios').select('*').eq('id',uid).maybeSingle();
  if(data){PROV=data;$('pname').textContent=data.nombre||SESSION.user.email;}
  else{
    const meta=SESSION.user.user_metadata||{};
    const nombre=meta.nombre||meta.full_name||SESSION.user.email.split('@')[0];
    const cat=meta.categoria||'General';
    await sb.from('usuarios').upsert({id:uid,auth_id:uid,email:SESSION.user.email,nombre,tipo:'proveedor',categoria:cat,activo:true,karma:5.0},{onConflict:'id'});
    PROV={nombre,karma:5.0,servicios_completados:0,categoria:cat};
    $('pname').textContent=nombre;
  }
}

/* ── MAP ── */
function initMap(){
  if(MAP)return;
  MAP=L.map('map',{zoomControl:false,attributionControl:false}).setView([myLat,myLng],14);
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OSM'}).addTo(MAP);
  const ic=L.divIcon({className:'',html:`<div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#00ECF8,#0080AA);border:3px solid #fff;box-shadow:0 2px 12px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:22px">🔧</div>`,iconSize:[48,48],iconAnchor:[24,24]});
  MARKER=L.marker([myLat,myLng],{icon:ic}).addTo(MAP);
  renderDemandBubbles();
}
function renderDemandBubbles(){
  const now=new Date().getMinutes();
  const jobs=[
    {lat:myLat+.013,lng:myLng+.009,ic:'⚡',p:120,t:'Electricista',age:2},
    {lat:myLat-.008,lng:myLng+.014,ic:'🔧',p:95,t:'Plomero',age:18},
    {lat:myLat+.006,lng:myLng-.011,ic:'🧹',p:80,t:'Limpieza',age:5},
    {lat:myLat-.014,lng:myLng+.005,ic:'🎨',p:110,t:'Pintor',age:30},
    {lat:myLat+.02,lng:myLng+.003,ic:'🌿',p:70,t:'Jardinero',age:8},
  ];
  jobs.forEach(j=>{
    const urgent=j.age<10;
    const color=urgent?'#EF4444':'#F59E0B';
    const html=`<div style="background:#fff;border-radius:18px;padding:5px 10px;box-shadow:0 2px 12px rgba(0,0,0,.18);display:flex;align-items:center;gap:5px;white-space:nowrap;border:2px solid ${color}"><span>${j.ic}</span><span style="font-size:11px;font-weight:800">R$${j.p}</span>${urgent?`<span style="width:6px;height:6px;border-radius:50%;background:${color};animation:bl 1s infinite"></span>`:''}</div>`;
    const ic=L.divIcon({className:'',html,iconSize:[null,null]});
    L.marker([j.lat,j.lng],{icon:ic}).addTo(MAP).on('click',()=>{
      if(isOnline){showJobOffer(j);}else toast('Ponete en línea para recibir pedidos');
    });
  });
}

function startGPS(){
  if(!navigator.geolocation)return;
  navigator.geolocation.watchPosition(pos=>{
    myLat=pos.coords.latitude;myLng=pos.coords.longitude;
    if(MARKER)MARKER.setLatLng([myLat,myLng]);
    if(MAP&&!isOnline)MAP.panTo([myLat,myLng]);
    // Geocode dirección
    fetch(`https://nominatim.openstreetmap.org/reverse?lat=${myLat}&lon=${myLng}&format=json`)
      .then(r=>r.json()).then(d=>{
        const addr=d.display_name?.split(',').slice(0,3).join(', ')||'';
        if(addr&&PROV&&!PROV.endereco){
          PROV.endereco=addr;
          sb.from('usuarios').update({lat:myLat,lng:myLng,endereco:addr}).eq('id',SESSION.user.id);
        } else if(isOnline){
          sb.from('usuarios').update({lat:myLat,lng:myLng}).eq('id',SESSION.user.id);
        }
      }).catch(()=>{
        if(isOnline)sb.from('usuarios').update({lat:myLat,lng:myLng}).eq('id',SESSION.user.id);
      });
  },{enableHighAccuracy:true,timeout:10000,maximumAge:20000});
}

/* ── JOB FLOW ── */
let ACTIVE_JOB=null;
function showJobOffer(j){
  if(!isOnline||jobState!=='idle')return;
  const opts=[
    {ic:'⚡',t:'Electricista',p:120,d:1.8,addr:'Rua das Flores, 142 — Centro'},
    {ic:'🔧',t:'Plomero',p:95,d:2.3,addr:'Av. Beira Mar, 890 — Trindade'},
    {ic:'🧹',t:'Limpieza',p:80,d:.9,addr:'Rua Felipe Schmidt, 23 — Centro'},
    {ic:'🎨',t:'Pintor',p:110,d:1.4,addr:'Rua Dom Jaime, 56 — Estreito'},
  ];
  JOB=j||opts[Math.floor(Math.random()*opts.length)];
  $('jnic').textContent=JOB.ic;
  $('jtit').textContent=JOB.t+' solicitado';
  $('jsub').textContent=`${JOB.d}km de distancia · R$${JOB.p}`;
  $('jobnot').classList.add('show');
  jSec=30;clearInterval(jobTimer);
  jobTimer=setInterval(()=>{
    jSec--;$('jsecs').textContent=`${jSec}s para aceptar`;
    $('jbar').style.width=(jSec/30*100)+'%';
    if(jSec<=0){clearInterval(jobTimer);$('jobnot').classList.remove('show');JOB=null;toast('Pedido expirado — pasó al próximo proveedor');}
  },1000);
}
function acceptJob(){
  clearInterval(jobTimer);$('jobnot').classList.remove('show');
  jobState='en_camino';ACTIVE_JOB=JOB;
  $('jbico').textContent=ACTIVE_JOB.ic;
  $('jbtit').textContent=ACTIVE_JOB.t+' — '+ACTIVE_JOB.addr;
  $('jbsub').textContent=`${ACTIVE_JOB.d}km · R$${ACTIVE_JOB.p}`;
  $('jobbar').classList.add('show');
  $('jbbtn').textContent='✓ Llegué';
  toast('✅ Pedido aceptado — ¡Navegá hacia el cliente!');
  MAP?.panTo([myLat+.005,myLng+.005]);
}
function rejectJob(){clearInterval(jobTimer);$('jobnot').classList.remove('show');JOB=null;toast('Pedido rechazado');}
function navigateJob(){
  if(!ACTIVE_JOB)return;
  const addr=encodeURIComponent(ACTIVE_JOB.addr||'Florianópolis, SC');
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${addr}&travelmode=driving`,'_blank');
}
function nextJobState(){
  if(jobState==='en_camino'){
    jobState='ejecutando';$('jbbtn').textContent='✓ Completar';$('jbsub').textContent='Ejecutando el servicio...';toast('📍 Ubicación confirmada');
  } else if(jobState==='ejecutando'){
    jobState='idle';$('jobbar').classList.remove('show');ACTIVE_JOB=null;
    toast('🎉 Servicio completado · R$'+JOB?.p+' acreditados');
    JOB=null;
    if(PROV){PROV.servicios_completados=(PROV.servicios_completados||0)+1;}
  }
}

/* ── DOCS ── */
let currentDocType=null;
async function initDocs(){
  if(!SESSION)return;
  const{data}=await sb.from('documentos').select('tipo,estado').eq('usuario_id',SESSION.user.id);
  if(!data)return;
  const map={cpf:'cpf',selfie:'selfie',cert:'cert'};
  const statusMap={aprobado:'<span class="doc-status ds-ok">✓ Aprobado</span>',rechazado:'<span class="doc-status ds-err">✕ Rechazado</span>',pendiente:'<span class="doc-status ds-pen">● En revisión</span>',procesando:'<span class="doc-status ds-pen">⏳ Procesando</span>'};
  data.forEach(doc=>{
    const key=Object.keys(map).find(k=>doc.tipo.includes(k));
    if(key){const el=$('st-'+key);if(el)el.outerHTML=statusMap[doc.estado]||statusMap.pendiente;$('doc-'+key)?.classList.add('uploaded');}
  });
}
function uploadDoc(tipo){
  currentDocType=tipo;
  const inp=$('fileinput');if(inp){inp.click();}
}
async function handleFile(input){
  const file=input.files[0];if(!file||!currentDocType||!SESSION)return;
  toast('⏳ Subiendo documento...');
  const path=`${SESSION.user.id}/${currentDocType}_${Date.now()}.${file.name.split('.').pop()}`;
  const{data:up,error:upErr}=await sb.storage.from('documentos').upload(path,file);
  if(upErr){toast('❌ Error: '+upErr.message);return;}
  const url=sb.storage.from('documentos').getPublicUrl(path).data?.publicUrl||path;
  await sb.from('documentos').insert({usuario_id:SESSION.user.id,tipo:currentDocType,url_storage:url,estado:'pendiente'});
  toast('✅ Documento enviado — en revisión');
  const el=$('st-'+currentDocType);
  if(el){el.className='doc-status ds-pen';el.textContent='● En revisión';}
  $('doc-'+currentDocType)?.classList.add('uploaded');
  input.value='';
}

const HSUGS=['¿Cuánto gané hoy?','¿Cómo mejorar mi karma?','Ayuda con un cliente','¿Cómo subo mi tarifa?','Ver mis servicios del mes'];
function openChat(){document.getElementById('chat').style.height='min(85vh,700px)';showSugs(HSUGS);if(!chatHistory.length)hugoCall('__INICIO__');}

function showSugs(list){$('csugs').innerHTML=list.map(s=>`<button class="csug" onclick="sendSug('${s.replace(/'/g,"\\'")}')">${s}</button>`).join('');}
function addMsg(role,text){const d=$('cmsgs');const el=document.createElement('div');el.className='msg '+(role==='u'?'mu':'mh');el.textContent=text;d.appendChild(el);requestAnimationFrame(()=>d.scrollTop=d.scrollHeight);}
function showTyp(on){const ex=$('mtyp');if(on&&!ex){const t=document.createElement('div');t.id='mtyp';t.className='mtyp';t.innerHTML='<span class="td"></span><span class="td"></span><span class="td"></span>';$('cmsgs').appendChild(t);$('cmsgs').scrollTop=99999;}else if(!on&&ex)ex.remove();}
async function hugoCall(msg){
  showTyp(true);
  const ctx=[PROV?`Proveedor:${PROV.nombre},Karma:${PROV.karma||5},Cat:${PROV.categoria||'?'},Servicios:${PROV.servicios_completados||0},Tarifa:R$${PROV.tarifa_base||0}`:'',`Online:${isOnline}`,`EstadoTrabajo:${jobState}`,`GPS:${myLat.toFixed(4)},${myLng.toFixed(4)}`].filter(Boolean).join(' | ');
  try{
    const r=await fetch('/api/hugo/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({role:'proveedor',message:msg,context:ctx,history:chatHistory.slice(-8)})});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();showTyp(false);
    const reply=d.hugo_mensaje||'Sin respuesta de Hugo.';
    addMsg('h',reply);chatHistory.push({role:'assistant',content:reply});hugoSpeak(reply);
  }catch(e){showTyp(false);addMsg('h','⚠️ Error: '+e.message);}
}
async function sendChat(){const inp=$('cin');const msg=inp.value.trim();if(!msg)return;inp.value='';addMsg('u',msg);chatHistory.push({role:'user',content:msg});showSugs([]);await hugoCall(msg);showSugs(HSUGS);}
function sendSug(s){addMsg('u',s);chatHistory.push({role:'user',content:s});showSugs([]);hugoCall(s).then(()=>showSugs(HSUGS));}

/* ── VOZ (Web Speech API) ── */
const hasSpeech = 'speechSynthesis' in window;
const hasRec    = 'webkitSpeechRecognition' in window || 'SpeechRecognition' in window;
let speaking = false, recording = false, rec = null;

function hugoSpeak(text) {
  if (!hasSpeech || !text) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text.slice(0, 200));
  u.lang = 'es-AR'; u.rate = 1.05; u.pitch = 1;
  // Preferir voz en español si disponible
  const voices = window.speechSynthesis.getVoices();
  const esVoice = voices.find(v => v.lang.startsWith('es'));
  if (esVoice) u.voice = esVoice;
  u.onstart = () => speaking = true;
  u.onend = () => { speaking = false; updateMicBtn(); };
  window.speechSynthesis.speak(u);
}

function startRec() {
  if (!hasRec) { toast('Tu navegador no soporta reconocimiento de voz'); return; }
  if (recording) { stopRec(); return; }
  const SR = window.webkitSpeechRecognition || window.SpeechRecognition;
  rec = new SR();
  rec.lang = 'es-AR'; rec.continuous = false; rec.interimResults = false;
  rec.onstart = () => { recording = true; updateMicBtn(); };
  rec.onresult = (e) => {
    const txt = e.results[0][0].transcript;
    const inp = document.getElementById('cin');
    if (inp) inp.value = txt;
    stopRec();
    setTimeout(() => sendChat(), 200);
  };
  rec.onerror = () => stopRec();
  rec.onend = () => { recording = false; updateMicBtn(); };
  rec.start();
}

function stopRec() {
  if (rec) { try { rec.stop(); } catch(e) {} rec = null; }
  recording = false; updateMicBtn();
}

function updateMicBtn() {
  const btn = document.getElementById('micbtn');
  if (!btn) return;
  if (recording) {
    btn.textContent = '🔴'; btn.style.background = '#EF4444';
  } else {
    btn.textContent = '🎤'; btn.style.background = '#111';
  }
}

// Esperar voces disponibles
if (hasSpeech) {
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

</script>
</body>
</html>
