<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>U.GO — Proveedor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:#0f1117;font-family:'Inter',-apple-system,sans-serif;}
:root{--c:#00C8D7;--cd:rgba(0,200,215,.1);--k:#111;--w:#FFF;--bg:#F7F7F7;--m:#888;--b:#EBEBEB;--g:#22C55E;--r:#EF4444;--a:#F59E0B;}

/* MAP */
#map{position:fixed;inset:0;width:100%;height:100%;z-index:0;}
.leaflet-container{background:#1a2030;}

/* AUTH OVERLAY */
#auth-screen{position:fixed;inset:0;z-index:100;background:linear-gradient(160deg,#0f1117 0%,#1a2030 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
#auth-screen.hidden{display:none;}
.auth-logo{font-size:36px;font-weight:900;color:#FFF;letter-spacing:-1.5px;margin-bottom:4px;}
.auth-sub{font-size:12px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:2px;margin-bottom:36px;}
.auth-card{background:#FFF;border-radius:24px;padding:24px;width:100%;max-width:380px;}
.auth-title{font-size:20px;font-weight:800;margin-bottom:4px;}
.auth-desc{font-size:13px;color:#888;margin-bottom:20px;}
.auth-field{margin-bottom:12px;}
.auth-field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#888;margin-bottom:5px;}
.auth-field input,.auth-field select{width:100%;padding:12px 14px;border:1.5px solid #E5E5E5;border-radius:12px;font-size:14px;font-family:inherit;outline:none;transition:border .2s;}
.auth-field input:focus,.auth-field select:focus{border-color:#00C8D7;}
.auth-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.auth-btn{width:100%;padding:14px;background:#111;color:#FFF;border:none;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:6px;transition:opacity .2s;}
.auth-btn:active{opacity:.85;}
.auth-link{text-align:center;font-size:13px;color:#888;margin-top:12px;cursor:pointer;}
.auth-link span{color:#00828F;font-weight:600;}
.auth-err{background:#FEF2F2;border:1px solid #FCA5A5;border-radius:10px;padding:10px 12px;font-size:12px;color:#DC2626;margin-bottom:10px;display:none;}

/* TOP */
#top{position:fixed;top:0;left:0;right:0;z-index:20;padding:max(48px,env(safe-area-inset-top,48px)) 18px 14px;background:linear-gradient(to bottom,rgba(255,255,255,.97) 65%,transparent);display:flex;align-items:center;justify-content:space-between;}
.logo{font-weight:900;font-size:22px;letter-spacing:-.6px;color:var(--k);}
.logo-s{font-size:11px;color:var(--m);margin-top:-2px;}
.top-r{display:flex;align-items:center;gap:8px;}
#online-tog{display:flex;align-items:center;gap:8px;background:#FFF;border-radius:24px;padding:7px 14px;box-shadow:0 2px 12px rgba(0,0,0,.12);cursor:pointer;border:none;font-family:inherit;transition:all .25s;}
#online-tog.on{background:#111;}
.tog-dot{width:9px;height:9px;border-radius:50%;background:#CCC;transition:background .25s;}
#online-tog.on .tog-dot{background:#22C55E;animation:bl 1.5s infinite;}
.tog-label{font-size:12px;font-weight:700;color:#888;transition:color .25s;}
#online-tog.on .tog-label{color:#FFF;}

/* JOB NOTIFICATION */
#job-notif{position:fixed;left:0;right:0;bottom:78px;z-index:40;padding:0 14px 12px;transform:translateY(110%);transition:transform .4s cubic-bezier(.32,.72,0,1);}
#job-notif.show{transform:translateY(0);}

/* SHEET */
#sheet{position:fixed;left:0;right:0;z-index:25;background:var(--w);border-top-left-radius:26px;border-top-right-radius:26px;box-shadow:0 -6px 28px rgba(0,0,0,.13);transition:bottom .38s cubic-bezier(.32,.72,0,1),height .38s cubic-bezier(.32,.72,0,1);overflow:hidden;bottom:78px;height:0;}
.handle{width:34px;height:4px;background:var(--b);border-radius:2px;margin:9px auto 0;flex-shrink:0;}
#sb{height:calc(100% - 22px);overflow-y:auto;overflow-x:hidden;}

/* NAV */
#nav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:var(--w);border-top:1px solid var(--b);padding:8px 4px max(20px,env(safe-area-inset-bottom,20px));display:flex;align-items:center;justify-content:space-around;height:78px;}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;background:none;border:none;font-family:inherit;padding:4px 10px;border-radius:12px;transition:background .15s;position:relative;}
.ni:active{background:#F5F5F5;}
.ni-ic{font-size:19px;line-height:1;}
.ni-lb{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--m);}
.ni.on .ni-lb{color:var(--c);}
.ni-badge{position:absolute;top:-2px;right:-2px;width:8px;height:8px;background:var(--r);border-radius:50%;border:1.5px solid #FFF;display:none;}
.ni-badge.show{display:block;}

/* ORB */
#orb{width:60px;height:60px;border-radius:50%;background:linear-gradient(145deg,#00ECF8,#009AAA);border:4px solid var(--w);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;margin-top:-24px;animation:op 2.5s ease-in-out infinite;transition:transform .15s;border:none;font-family:inherit;}
#orb:active{transform:scale(.93);}

/* UTILS */
.btnm{width:100%;padding:14px;background:var(--k);color:var(--w);border:none;border-radius:26px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s;}
.btnm:active{opacity:.85;}
.btng{width:100%;padding:14px;background:#22C55E;color:var(--w);border:none;border-radius:26px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.btnr{width:100%;padding:11px;background:none;color:var(--r);border:1.5px solid var(--r);border-radius:26px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.sbox{background:#F5F5F5;border-radius:12px;padding:8px;text-align:center;}
.slbl{font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.sval{font-weight:800;font-size:16px;}
.pill-g{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(34,197,94,.1);color:#16A34A;}
.pill-c{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;background:var(--cd);color:#00828F;}
.pill-a{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(245,158,11,.1);color:#B45309;}
::-webkit-scrollbar{width:2px;}::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:2px;}
.cmsg{display:flex;gap:7px;align-items:flex-end;animation:fi .2s ease;}
.cmsg-r{justify-content:flex-end;}
.uorb{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#00ECF8,#009AAA);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.b-u{background:#F0F0F0;border-radius:16px 16px 16px 4px;padding:9px 13px;font-size:13px;max-width:80%;line-height:1.5;}
.b-me{background:var(--k);color:var(--w);border-radius:16px 16px 4px 16px;padding:9px 13px;font-size:13px;max-width:80%;line-height:1.5;}
.dot{width:6px;height:6px;border-radius:50%;background:#999;animation:da 1s ease-in-out infinite;display:inline-block;}
@keyframes op{0%,100%{box-shadow:0 0 0 8px rgba(0,200,215,.14),0 4px 18px rgba(0,200,215,.42);}50%{box-shadow:0 0 0 16px rgba(0,200,215,.06),0 4px 26px rgba(0,200,215,.64);}}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes da{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-4px);opacity:1}}
@keyframes countdown{from{stroke-dashoffset:0;}to{stroke-dashoffset:157;}}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-logo">U.GO</div>
  <div class="auth-sub">Portal Proveedor</div>
  <div class="auth-card">
    <div id="auth-err" class="auth-err"></div>

    <!-- LOGIN VIEW -->
    <div id="view-login">
      <div class="auth-title">Bienvenido</div>
      <div class="auth-desc">Ingresá a tu cuenta de proveedor</div>
      <div class="auth-field"><label>Email</label><input id="l-email" type="email" placeholder="tu@email.com"/></div>
      <div class="auth-field"><label>Contraseña</label><input id="l-pass" type="password" placeholder="••••••••"/></div>
      <button class="auth-btn" onclick="doLogin()">Ingresar →</button>
      <div class="auth-link" onclick="switchView('register')">¿No tenés cuenta? <span>Registrate</span></div>
    </div>

    <!-- REGISTER VIEW -->
    <div id="view-register" style="display:none">
      <div class="auth-title">Crear cuenta</div>
      <div class="auth-desc">Registrate como proveedor de servicios</div>
      <div class="auth-grid">
        <div class="auth-field"><label>Nombre</label><input id="r-nombre" type="text" placeholder="Juan"/></div>
        <div class="auth-field"><label>Apellido</label><input id="r-apellido" type="text" placeholder="García"/></div>
      </div>
      <div class="auth-field"><label>Email</label><input id="r-email" type="email" placeholder="tu@email.com"/></div>
      <div class="auth-field"><label>Teléfono</label><input id="r-tel" type="tel" placeholder="+55 48 9 9999-9999"/></div>
      <div class="auth-field"><label>Contraseña</label><input id="r-pass" type="password" placeholder="Mínimo 6 caracteres"/></div>
      <div class="auth-field"><label>Categoría principal</label>
        <select id="r-cat">
          <option value="">Cargando categorías...</option>
        </select>
      </div>
      <button class="auth-btn" onclick="doRegister()">Crear cuenta →</button>
      <div class="auth-link" onclick="switchView('login')">¿Ya tenés cuenta? <span>Ingresá</span></div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="map"></div>

<div id="top">
  <div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="logo">U.GO</div>
      <span style="font-size:11px;font-weight:700;background:rgba(0,200,215,.12);color:#00828F;padding:3px 9px;border-radius:20px;">PRO</span>
    </div>
    <div class="logo-s" id="top-s">Cargando...</div>
  </div>
  <div class="top-r">
    <button id="online-tog" onclick="toggleOnline()">
      <div class="tog-dot"></div>
      <span class="tog-label" id="tog-lbl">Offline</span>
    </button>
  </div>
</div>

<div id="job-notif">
  <div id="job-card" style="background:#FFF;border-radius:22px;box-shadow:0 8px 32px rgba(0,0,0,.18);overflow:hidden;"></div>
</div>

<div id="sheet"><div class="handle"></div><div id="sb"></div></div>

<nav id="nav">
  <button class="ni on" id="ni-radar" onclick="navTo('radar')"><span class="ni-ic">📡</span><span class="ni-lb">Radar</span></button>
  <button class="ni" id="ni-trab" onclick="navTo('trabajos')"><span class="ni-ic">⚡</span><span class="ni-badge" id="badge-job"></span><span class="ni-lb">Trabajos</span></button>
  <button id="orb" onclick="openChat()">🌀</button>
  <button class="ni" id="ni-gan" onclick="navTo('ganancias')"><span class="ni-ic">💰</span><span class="ni-lb">Ganancias</span></button>
  <button class="ni" id="ni-perf" onclick="navTo('perfil')"><span class="ni-ic">👤</span><span class="ni-lb">Perfil</span></button>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── CONFIG ───────────────────────────────────────────────
const SUPABASE_URL = 'https://byajcqrgetloavrgyqak.supabase.co';
const SUPABASE_KEY = 'sb_publishable_wAkmRZHwX9ddcZ-zNZSyXw_EH1f1iGZ';
const FN = `${SUPABASE_URL}/functions/v1`;
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── STATE ────────────────────────────────────────────────
let SESSION = null, PROVIDER = null;
let isOnline = false;
let myLat = -27.5954, myLng = -48.5480;
let mapInstance = null, myMarker = null, routeLayer = null;
let ACTIVE_JOB = null, JOB_TIMER = null;
let realtimeChannel = null, watchId = null;

// ── INIT ─────────────────────────────────────────────────
sb.auth.onAuthStateChange(async (event, session) => {
  SESSION = session;
  if (session) {
    await loadProviderProfile();
    document.getElementById('auth-screen').classList.add('hidden');
    initMap();
    startGPS();
    subscribeToJobs();
    loadCategorias(); // load for register form even if logged in
    showRadar();
  } else {
    document.getElementById('auth-screen').classList.remove('hidden');
    loadCategorias();
  }
});

// ── AUTH ─────────────────────────────────────────────────
function switchView(v) {
  document.getElementById('view-login').style.display = v==='login' ? '' : 'none';
  document.getElementById('view-register').style.display = v==='register' ? '' : 'none';
  document.getElementById('auth-err').style.display = 'none';
}

function showErr(msg) {
  const el = document.getElementById('auth-err');
  el.textContent = msg; el.style.display = 'block';
}

async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  if (!email||!pass) return showErr('Completá todos los campos');
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) showErr(error.message);
}

async function doRegister() {
  const nombre   = document.getElementById('r-nombre').value.trim();
  const apellido = document.getElementById('r-apellido').value.trim();
  const email    = document.getElementById('r-email').value.trim();
  const tel      = document.getElementById('r-tel').value.trim();
  const pass     = document.getElementById('r-pass').value;
  const catId    = document.getElementById('r-cat').value;
  if (!nombre||!email||!pass||!catId) return showErr('Completá todos los campos');

  const { data, error } = await sb.auth.signUp({ email, password: pass });
  if (error) return showErr(error.message);

  // Crear perfil en usuarios
  const { error: perfilErr } = await sb.from('usuarios').insert({
    auth_id: data.user.id,
    email, nombre, apellido, telefono: tel,
    tipo: 'proveedor',
    categorias_ids: [catId],
    pais: 'BR', zona: 'Florianópolis'
  });
  if (perfilErr) showErr(perfilErr.message);
}

async function loadProviderProfile() {
  const { data } = await sb.from('usuarios')
    .select('*')
    .eq('auth_id', SESSION.user.id)
    .single();
  if (data) {
    PROVIDER = data;
    document.getElementById('top-s').textContent = `${data.nombre} ${data.apellido||''} · ⭐ ${data.karma}`;
    isOnline = data.online;
    updateOnlineUI();
  }
}

async function loadCategorias() {
  const { data } = await sb.from('categorias').select('id,nombre,emoji').eq('activa',true);
  const sel = document.getElementById('r-cat');
  if (data&&data.length) {
    sel.innerHTML = data.map(c=>`<option value="${c.id}">${c.emoji} ${c.nombre}</option>`).join('');
  }
}

// ── MAP ──────────────────────────────────────────────────
function initMap() {
  if (mapInstance) return;
  mapInstance = L.map('map', { zoomControl:false, center:[myLat,myLng], zoom:14 });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution:'© CARTO', maxZoom:19
  }).addTo(mapInstance);

  const icon = L.divIcon({
    html:`<div style="width:46px;height:46px;border-radius:50%;background:linear-gradient(145deg,#00ECF8,#009AAA);border:3px solid white;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 16px rgba(0,200,215,.5);">🔧</div>`,
    className:'', iconSize:[46,46], iconAnchor:[23,23]
  });
  myMarker = L.marker([myLat,myLng], {icon}).addTo(mapInstance);
}

function updateMapMarker() {
  if (!myMarker||!mapInstance) return;
  myMarker.setLatLng([myLat,myLng]);
}

// ── GPS ──────────────────────────────────────────────────
function startGPS() {
  if (!navigator.geolocation) return;
  watchId = navigator.geolocation.watchPosition(async pos => {
    myLat = pos.coords.latitude;
    myLng = pos.coords.longitude;
    updateMapMarker();
    if (isOnline && SESSION) {
      await callFn('provider-status', { online: true, lat: myLat, lng: myLng });
    }
  }, null, { enableHighAccuracy:true, maximumAge:15000 });
}

// ── ONLINE TOGGLE ────────────────────────────────────────
async function toggleOnline() {
  if (!SESSION||!PROVIDER) return;
  const newStatus = !isOnline;
  const r = await callFn('provider-status', { online: newStatus, lat: myLat, lng: myLng });
  if (r&&r.ok) {
    isOnline = newStatus;
    updateOnlineUI();
    PROVIDER.online = newStatus;
    if (isOnline) {
      showToast('✅ Estás online — listo para recibir pedidos');
    } else {
      showToast('⏸ Offline');
      if (realtimeChannel) { sb.removeChannel(realtimeChannel); realtimeChannel=null; }
    }
    subscribeToJobs();
  }
}

function updateOnlineUI() {
  const tog = document.getElementById('online-tog');
  const lbl = document.getElementById('tog-lbl');
  if (isOnline) { tog.classList.add('on'); lbl.textContent='Online'; }
  else { tog.classList.remove('on'); lbl.textContent='Offline'; }
}

// ── REALTIME JOBS ────────────────────────────────────────
function subscribeToJobs() {
  if (realtimeChannel) { sb.removeChannel(realtimeChannel); realtimeChannel=null; }
  if (!isOnline||!SESSION) return;

  realtimeChannel = sb.channel('available-jobs')
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'servicios',
      filter: 'estado=eq.negociando'
    }, payload => showJobNotification(payload.new))
    .subscribe();
}

// ── JOB NOTIFICATION ────────────────────────────────────
function showJobNotification(job) {
  if (ACTIVE_JOB) return; // ya tiene un trabajo
  const notif = document.getElementById('job-notif');
  const card  = document.getElementById('job-card');
  const badge = document.getElementById('badge-job');
  badge.classList.add('show');

  // Calcular distancia aproximada
  const dist = haversine(myLat, myLng, job.lat_cliente||myLat, job.lng_cliente||myLng);
  const neto = job.tarifa ? (job.tarifa * 0.85).toFixed(0) : '~';

  let secs = 90;
  if (JOB_TIMER) clearInterval(JOB_TIMER);

  const render = () => {
    card.innerHTML = `
      <div style="padding:16px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
          <div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;">Nuevo pedido</div>
          <div style="display:flex;align-items:center;gap:8px;">
            <svg width="28" height="28"><circle cx="14" cy="14" r="12" fill="none" stroke="#EEE" stroke-width="2.5"/><circle cx="14" cy="14" r="12" fill="none" stroke="#EF4444" stroke-width="2.5" stroke-dasharray="75.4" stroke-dashoffset="${75.4*(1-secs/90)}" transform="rotate(-90 14 14)" style="transition:stroke-dashoffset .9s linear;"/></svg>
            <span style="font-size:16px;font-weight:800;color:#EF4444;">${secs}s</span>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;">
          <div class="sbox"><div class="slbl">Distancia</div><div class="sval">${dist.toFixed(1)}km</div></div>
          <div class="sbox"><div class="slbl">Neto</div><div class="sval" style="color:#22C55E;">R$${neto}</div></div>
          <div class="sbox"><div class="slbl">Tipo</div><div class="sval" style="font-size:20px;">🔧</div></div>
        </div>
        <div style="background:#F8F8F8;border-radius:12px;padding:10px 12px;margin-bottom:12px;font-size:13px;color:#555;">
          📍 ${dist.toFixed(1)} km · ${job.zona||'Sin zona'}<br>
          <span style="color:#888;font-size:12px;">${job.descripcion||'Sin descripción'}</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <button class="btnr" onclick="rejectJob('${job.id}')">✕ Rechazar</button>
          <button class="btng" onclick="acceptJob('${job.id}',${job.lat_cliente||myLat},${job.lng_cliente||myLng})">✓ Aceptar</button>
        </div>
      </div>`;
  };

  render();
  notif.classList.add('show');

  JOB_TIMER = setInterval(() => {
    secs--;
    render();
    if (secs <= 0) { clearInterval(JOB_TIMER); hideJobNotif(); }
  }, 1000);
}

function hideJobNotif() {
  document.getElementById('job-notif').classList.remove('show');
  document.getElementById('badge-job').classList.remove('show');
  if (JOB_TIMER) { clearInterval(JOB_TIMER); JOB_TIMER=null; }
}

function rejectJob(id) { hideJobNotif(); showToast('Pedido rechazado'); }

async function acceptJob(id, clLat, clLng) {
  hideJobNotif();
  showToast('⏳ Aceptando pedido...');
  const r = await callFn('service-accept', { servicio_id: id });
  if (r&&r.ok) {
    ACTIVE_JOB = { id, lat: clLat, lng: clLng, ...r };
    showNavigating();
  } else {
    showToast('❌ ' + (r?.error||'Error al aceptar'));
  }
}

// ── SERVICE FLOW ─────────────────────────────────────────
async function updateStatus(estado) {
  if (!ACTIVE_JOB||!SESSION) return;
  await callFn('service-status', { servicio_id: ACTIVE_JOB.id, estado, lat: myLat, lng: myLng });
}

function showNavigating() {
  updateStatus('en_camino');
  if (mapInstance&&ACTIVE_JOB.lat) {
    mapInstance.setView([ACTIVE_JOB.lat, ACTIVE_JOB.lng], 15);
    if (routeLayer) mapInstance.removeLayer(routeLayer);
    routeLayer = L.polyline([[myLat,myLng],[ACTIVE_JOB.lat,ACTIVE_JOB.lng]], {color:'#00C8D7',weight:4,opacity:.8}).addTo(mapInstance);
    const destIcon = L.divIcon({html:`<div style="width:36px;height:36px;border-radius:50%;background:#EF4444;border:3px solid white;display:flex;align-items:center;justify-content:center;font-size:16px;">📍</div>`,className:'',iconSize:[36,36],iconAnchor:[18,18]});
    L.marker([ACTIVE_JOB.lat,ACTIVE_JOB.lng],{icon:destIcon}).addTo(mapInstance);
  }
  openSheet('min(46vh,360px)',`
    <div style="padding:20px;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
        <div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#00ECF8,#009AAA);display:flex;align-items:center;justify-content:center;font-size:22px;">🧭</div>
        <div>
          <div style="font-weight:800;font-size:18px;">En camino</div>
          <div style="font-size:13px;color:#888;">Dirigiéndote al cliente</div>
        </div>
      </div>
      <div style="background:#F8F8F8;border-radius:14px;padding:12px;margin-bottom:14px;font-size:13px;color:#555;">
        <div style="font-weight:700;margin-bottom:4px;">📍 Dirección del cliente</div>
        ${ACTIVE_JOB?.direccion||ACTIVE_JOB?.cliente?.direccion||'Ver mapa'}

}

function showInService() {
  updateStatus('ejecutando');
  openSheet('min(52vh,420px)',`
    <div style="padding:20px;">
      <div style="text-align:center;margin-bottom:16px;">
        <div style="font-size:46px;margin-bottom:8px;">🔧</div>
        <div style="font-weight:800;font-size:20px;">Servicio en curso</div>

      </div>
      <div style="background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.2);border-radius:14px;padding:12px;margin-bottom:16px;font-size:13px;color:#444;">
        🌀 U.GO está intermediando la sesión. El pago queda retenido hasta que el cliente apruebe.
      </div>
      <div style="margin-bottom:14px;">
        <div style="font-size:12px;font-weight:700;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;">Fotos del trabajo</div>

function addPhoto(n) {
  const el = document.getElementById('ph'+n);
  if (el) { const emojis=['✅','✅','✅','✅']; el.innerHTML=`<div style="font-size:24px;">${emojis[n-1]}</div>`; el.style.borderColor='#22C55E'; el.style.background='rgba(34,197,94,.06)'; }
}

async function showCompleted() {
  await updateStatus('completado');

  if (routeLayer) { mapInstance.removeLayer(routeLayer); routeLayer=null; }
  const tarifa = ACTIVE_JOB?.tarifa || 85;
  const neto = (tarifa * 0.85).toFixed(2);

function resetJob() { ACTIVE_JOB=null; closeSheet(); showRadar(); setActiveNav('radar'); }

// ── NAV SECTIONS ─────────────────────────────────────────
function navTo(sec) {
  setActiveNav(sec);
  if (sec==='radar')     showRadar();
  else if (sec==='trabajos')  showWorklist();
  else if (sec==='ganancias') showGanancias();
  else if (sec==='perfil')    showPerfil();
}

function showRadar() {
  if (ACTIVE_JOB) { renderActiveJobSheet(); return; }
  openSheet('min(42vh,320px)',`
    <div style="padding:20px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div>
          <div style="font-weight:800;font-size:18px;">📡 Radar activo</div>

        <div style="font-size:13px;color:#444;">📍 ${myLat.toFixed(4)}, ${myLng.toFixed(4)}</div>

async function showWorklist() {
  if (!SESSION||!PROVIDER) return;

    .select('id,estado,zona,tarifa,created_at,categorias:categoria_id(nombre,emoji),clientes:cliente_id(nombre)')

    .order('created_at', { ascending: false }).limit(10);

  openSheet('min(70vh,600px)',`
    <div style="padding:16px 16px 0;">
      <div style="font-weight:800;font-size:18px;margin-bottom:14px;">⚡ Mis trabajos</div>
      ${!data?.length ? '<div style="text-align:center;padding:24px;color:#888;font-size:14px;">Sin trabajos registrados aún</div>' :
        data.map(s=>`
        <div style="background:#F8F8F8;border-radius:14px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;">
          <div style="font-size:22px;">${s.categorias?.emoji||'🔧'}</div>
          <div style="flex:1;">
            <div style="font-weight:700;font-size:13px;">${s.categorias?.nombre||'Servicio'} · ${s.zona||''}</div>
            <div style="font-size:11px;color:#888;margin-top:2px;">${s.clientes?.nombre||'—'} · ${new Date(s.created_at).toLocaleDateString('pt-BR')}</div>

            <span class="${s.estado==='completado'?'pill-g':s.estado==='cancelado'?'pill-a':'pill-c'}">${s.estado}</span>
            ${s.tarifa?`<div style="font-size:12px;font-weight:700;color:#22C55E;text-align:right;margin-top:3px;">R$${(s.tarifa*.85).toFixed(0)}</div>`:''}

async function showGanancias() {

  const total = data?.reduce((a,s)=>a+(Number(s.ganancia_proveedor)||Number(s.tarifa)*0.85||0),0)||0;
  const count = data?.length||0;

  openSheet('min(52vh,420px)',`
    <div style="padding:20px;">

        <div style="font-size:42px;font-weight:900;color:#22C55E;">R$${total.toFixed(2)}</div>

      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">

function renderActiveJobSheet() {
  if (!ACTIVE_JOB) return;

// ── CHAT HUGO ────────────────────────────────────────────
function openChat() {
  setActiveNav('radar');
  openSheet('min(82vh,700px)',`
    <div style="display:flex;flex-direction:column;height:100%;">
      <div style="padding:10px 14px;border-bottom:1px solid #EEE;display:flex;align-items:center;gap:9px;flex-shrink:0;">
        <div class="uorb" style="width:28px;height:28px;font-size:14px;">🌀</div>
        <div><div style="font-weight:700;font-size:14px;">Hugo</div><div style="font-size:11px;color:#22C55E;">● Online</div></div>
        <button onclick="closeSheet();" style="margin-left:auto;background:none;border:none;font-size:20px;cursor:pointer;color:#999;">✕</button>
      </div>
      <div id="cm" style="flex:1;overflow-y:auto;padding:13px;display:flex;flex-direction:column;gap:8px;"></div>
      <div id="ci" style="padding:10px;border-top:1px solid #EEE;display:flex;gap:8px;flex-shrink:0;">
        <input id="chat-in" placeholder="Preguntá algo..." style="flex:1;padding:10px 14px;border:1.5px solid #EEE;border-radius:24px;font-size:13px;font-family:inherit;outline:none;" onkeydown="if(event.key==='Enter')sendChat()"/>
        <button onclick="sendChat()" style="width:40px;height:40px;border-radius:50%;background:#111;color:#FFF;border:none;font-size:18px;cursor:pointer;">↑</button>
      </div>
    </div>`);

  const ctx = PROVIDER ? `Proveedor: ${PROVIDER.nombre} ${PROVIDER.apellido||''}, Karma: ${PROVIDER.karma}, Servicios: ${PROVIDER.servicios_completados}, Online: ${isOnline}` : '';
  setTimeout(()=>addMsg('ugo',`Hola ${PROVIDER?.nombre||''}. Soy Hugo, tu socio estratégico en U.GO. ¿En qué te puedo ayudar?`),400);
}

async function sendChat() {
  const input = document.getElementById('chat-in');
  const msg = input?.value.trim();
  if (!msg) return;
  input.value='';
  addMsg('user',msg);
  showTyping();
  try {
    const ctx = `Proveedor: ${PROVIDER?.nombre||''}, Karma: ${PROVIDER?.karma||5}, Online: ${isOnline}`;
    const r = await fetch('https://ugo-admin-panel.vercel.app/api/hugo/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ role:'proveedor', message:msg, context:ctx, history:[] })
    });
    const d = await r.json();
    document.getElementById('typ')?.remove();
    addMsg('ugo', d.hugo_mensaje||'...');
  } catch(e) {
    document.getElementById('typ')?.remove();
    addMsg('ugo','Sin conexión con Hugo en este momento.');
  }
}

function addMsg(from,text){
  const cm=document.getElementById('cm');if(!cm)return;
  const d=document.createElement('div');
  d.className='cmsg'+(from==='user'?' cmsg-r':'');
  if(from==='ugo') d.innerHTML=`<div class="uorb">🌀</div><div class="b-u">${text}</div>`;
  else d.innerHTML=`<div class="b-me">${text}</div>`;
  cm.appendChild(d);setTimeout(()=>cm.scrollTop=cm.scrollHeight,40);
}
function showTyping(){
  const cm=document.getElementById('cm');if(!cm)return;
  const d=document.createElement('div');d.className='cmsg';d.id='typ';
  d.innerHTML=`<div class="uorb">🌀</div><div class="b-u"><div style="display:flex;gap:4px;"><span class="dot" style="animation-delay:0s"></span><span class="dot" style="animation-delay:.15s"></span><span class="dot" style="animation-delay:.3s"></span></div></div>`;
  cm.appendChild(d);cm.scrollTop=cm.scrollHeight;
}

// ── SHEET HELPERS ────────────────────────────────────────
function openSheet(h, html) {
  const s=document.getElementById('sheet');
  const sb_el=document.getElementById('sb');
  s.style.height=h; s.style.bottom='78px';
  sb_el.innerHTML=`<div class="handle"></div>${html}`;
}
function closeSheet() {
  document.getElementById('sheet').style.height='0';
}

function setActiveNav(id) {
  ['radar','trab','gan','perf'].forEach(n=>document.getElementById('ni-'+n)?.classList.remove('on'));
  const m={radar:'radar',trabajos:'trab',ganancias:'gan',perfil:'perf'};
  document.getElementById('ni-'+(m[id]||id))?.classList.add('on');
}

// ── UTILS ─────────────────────────────────────────────────
async function callFn(name, body) {
  if (!SESSION) return null;
  try {
    const r = await fetch(`${FN}/${name}`, {
      method:'POST',
      headers:{ 'Authorization':`Bearer ${SESSION.access_token}`, 'Content-Type':'application/json' },
      body: JSON.stringify(body)
    });
    return await r.json();
  } catch(e) { console.error(name, e); return null; }
}

function haversine(lat1,lng1,lat2,lng2) {
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function showToast(msg) {
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#111;color:#FFF;padding:10px 18px;border-radius:24px;font-size:13px;font-weight:600;z-index:999;white-space:nowrap;';
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}

async function doLogout() {
  await sb.auth.signOut();
  if (watchId) navigator.geolocation.clearWatch(watchId);
  PROVIDER=null;SESSION=null;ACTIVE_JOB=null;isOnline=false;
  closeSheet();
}
