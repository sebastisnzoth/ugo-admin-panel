<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>U.GO Proveedor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:-apple-system,'Inter',sans-serif;background:#1a2030}
:root{--c:#00C8D7;--k:#111;--w:#fff;--g:#22C55E;--r:#EF4444;--o:#F59E0B;--m:#888;--b:#eee}

/* AUTH */
#auth{position:fixed;inset:0;z-index:100;background:linear-gradient(160deg,#08090d,#0d1117);display:flex;align-items:center;justify-content:center;padding:20px}
.abox{width:100%;max-width:360px}
.alogo{font-size:34px;font-weight:900;color:#fff;letter-spacing:-1px;margin-bottom:2px}.alogo b{color:var(--c)}
.asub{font-size:12px;color:#555;margin-bottom:28px}
.atabs{display:flex;background:rgba(255,255,255,.06);border-radius:12px;padding:3px;margin-bottom:18px}
.atab{flex:1;text-align:center;padding:8px;border-radius:9px;font-size:13px;font-weight:600;color:#555;cursor:pointer;transition:.2s}
.atab.on{background:rgba(255,255,255,.1);color:#fff}
.aform{display:none}.aform.on{display:block}
.afl{margin-bottom:11px}
.afl label{display:block;font-size:10px;font-weight:700;color:#555;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.afl input,.afl select{width:100%;padding:11px 13px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);border-radius:11px;color:#fff;font-size:14px;font-family:inherit;outline:none;transition:.2s;-webkit-appearance:none}
.afl input:focus,.afl select:focus{border-color:var(--c)}
.afl input::placeholder{color:#444}
.afl select option{background:#1a2030;color:#fff}
.abtn{width:100%;padding:13px;background:var(--c);color:#000;font-weight:800;font-size:14px;border:none;border-radius:13px;cursor:pointer;margin-top:4px;font-family:inherit;transition:.2s}
.abtn:active{opacity:.85}
.aor{text-align:center;color:#444;font-size:11px;margin:10px 0}
.agbtn{width:100%;padding:12px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);border-radius:13px;color:#fff;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
.agbtn:active{background:rgba(255,255,255,.14)}
#aerr,#aerr2{display:none;color:var(--r);font-size:12px;margin-top:8px;padding:8px 12px;background:rgba(239,68,68,.1);border-radius:8px}

/* MAP */
#map{position:fixed;inset:0;z-index:0}

/* TOP */
#top{position:fixed;top:0;left:0;right:0;z-index:20;padding:max(48px,env(safe-area-inset-top,48px)) 16px 12px;background:linear-gradient(to bottom,rgba(255,255,255,.97) 60%,transparent);display:flex;align-items:center;justify-content:space-between}
.tlogo{font-weight:900;font-size:20px;letter-spacing:-.5px;color:var(--k)}.tlogo span{color:var(--c)}
.tsub{font-size:11px;color:var(--m);margin-top:-1px}
#tog{display:flex;align-items:center;gap:7px;background:#fff;border-radius:20px;padding:7px 13px;box-shadow:0 2px 10px rgba(0,0,0,.12);cursor:pointer;border:none;font-family:inherit;transition:.25s}
#tog.on{background:#111}
.togdot{width:8px;height:8px;border-radius:50%;background:#ccc;transition:.25s}
#tog.on .togdot{background:var(--g);animation:bl 1.5s infinite}
.toglb{font-size:11px;font-weight:700;color:#888;transition:.25s}
#tog.on .toglb{color:#fff}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}

/* JOB NOTIFICATION */
#jobnot{position:fixed;left:12px;right:12px;bottom:90px;z-index:40;background:#fff;border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,.22);padding:16px;transform:translateY(220%);transition:transform .4s cubic-bezier(.32,.72,0,1)}
#jobnot.show{transform:translateY(0)}
.jnh{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.jnic{width:42px;height:42px;border-radius:12px;background:rgba(0,200,215,.1);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.jntit{font-weight:800;font-size:14px}.jnsub{font-size:12px;color:var(--m)}
.jnbar-bg{height:4px;background:#f0f0f0;border-radius:2px;margin-bottom:5px;overflow:hidden}
.jnbar{height:100%;background:var(--c);transition:width .1s linear}
.jnsecs{font-size:11px;font-weight:700;color:var(--m);text-align:center;margin-bottom:10px}
.jnbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.jnacc{padding:12px;background:#111;color:#fff;font-weight:700;font-size:13px;border:none;border-radius:12px;cursor:pointer;font-family:inherit}
.jnrej{padding:12px;background:#f5f5f5;color:var(--m);font-weight:700;font-size:13px;border:none;border-radius:12px;cursor:pointer;font-family:inherit}

/* ACTIVE JOB BAR */
#jobbar{position:fixed;left:0;right:0;bottom:78px;z-index:35;background:#111;color:#fff;padding:12px 16px;display:none;align-items:center;gap:12px}
#jobbar.show{display:flex}
.jbico{font-size:20px}
.jbinfo{flex:1}.jbtit{font-weight:700;font-size:13px}.jbsub{font-size:11px;color:#aaa}
.jbbtn{padding:8px 14px;background:var(--c);color:#000;font-weight:700;font-size:12px;border:none;border-radius:20px;cursor:pointer;font-family:inherit;white-space:nowrap}
.jbnav{padding:8px 14px;background:rgba(255,255,255,.15);color:#fff;font-weight:700;font-size:12px;border:none;border-radius:20px;cursor:pointer;font-family:inherit;white-space:nowrap}

/* SHEET */
#sheet{position:fixed;left:0;right:0;z-index:25;background:#fff;border-radius:24px 24px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.08);overflow:hidden;bottom:78px;height:0;transition:height .35s cubic-bezier(.32,.72,0,1)}
.shandle{width:32px;height:4px;background:#e5e5e5;border-radius:2px;margin:8px auto 6px}
#sb{height:calc(100% - 20px);overflow-y:auto;padding-bottom:20px}
.pad{padding:0 16px}
.stt{font-weight:800;font-size:16px;color:var(--k);margin:12px 0 10px}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.sstat{background:#f8f8f8;border-radius:12px;padding:13px;text-align:center}
.sval{font-size:22px;font-weight:900;color:var(--k)}.slbl{font-size:10px;color:var(--m);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.shi{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #f5f5f5}
.shic{width:36px;height:36px;border-radius:11px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.shinfo{flex:1}.shtit{font-weight:700;font-size:13px}.shsub{font-size:11px;color:var(--m)}.shval{font-weight:800;font-size:13px;color:var(--g)}
/* Profile */
.phead{text-align:center;padding:18px 0 10px}
.pav{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,var(--c),#0080aa);margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;font-weight:800}
.pname{font-weight:800;font-size:17px}.pkr{display:inline-flex;align-items:center;gap:4px;background:rgba(0,200,215,.1);color:var(--c);border-radius:20px;padding:3px 11px;font-size:11px;font-weight:700;margin-top:7px}
.pfield{margin-bottom:12px}
.pfield label{display:block;font-size:11px;font-weight:700;color:var(--m);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.pfield input,.pfield select{width:100%;padding:10px 13px;background:#f8f8f8;border:1.5px solid var(--b);border-radius:11px;font-size:14px;font-family:inherit;outline:none;color:var(--k);transition:.2s}
.pfield input:focus,.pfield select:focus{border-color:var(--c);background:#fff}
.psave{width:100%;padding:12px;background:#111;color:#fff;font-weight:700;font-size:14px;border:none;border-radius:13px;cursor:pointer;margin-top:4px;font-family:inherit}
.blogout{width:100%;padding:12px;background:#fff;border:1.5px solid #e5e5e5;border-radius:13px;color:var(--r);font-weight:700;font-size:14px;cursor:pointer;margin-top:10px;font-family:inherit}
/* Docs */
.doc-card{border:2px dashed var(--b);border-radius:16px;padding:20px;text-align:center;cursor:pointer;transition:.2s;margin-bottom:12px}
.doc-card:hover{border-color:var(--c);background:rgba(0,200,215,.03)}
.doc-card.uploaded{border-style:solid;border-color:var(--g);background:rgba(34,197,94,.05)}
.doc-ic{font-size:28px;margin-bottom:6px}
.doc-tit{font-weight:700;font-size:13px}
.doc-sub{font-size:11px;color:var(--m);margin-top:2px}
.doc-status{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-top:8px}
.ds-pen{background:rgba(245,158,11,.1);color:var(--o)}
.ds-ok{background:rgba(34,197,94,.1);color:var(--g)}
.ds-err{background:rgba(239,68,68,.1);color:var(--r)}

/* NAV */
#nav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:#fff;border-top:1px solid var(--b);padding:7px 0 max(18px,env(safe-area-inset-bottom,18px));display:flex;align-items:center;justify-content:space-around;height:78px}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;background:none;border:none;font-family:inherit;padding:4px 10px;border-radius:11px}
.niic{font-size:19px;line-height:1}.nilb{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--m)}
.ni.on .nilb{color:var(--c)}
.norb{width:54px;height:54px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#00ecf8,#009aaa);box-shadow:0 0 16px rgba(0,200,215,.5);border:none;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 14px rgba(0,200,215,.5)}50%{box-shadow:0 0 26px rgba(0,200,215,.8)}}

/* CHAT */
#chat{position:fixed;left:0;right:0;bottom:0;z-index:50;background:#fff;border-radius:26px 26px 0 0;box-shadow:0 -4px 28px rgba(0,0,0,.13);height:0;overflow:hidden;transition:height .35s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column}
.ctop{padding:12px 16px 10px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:10px;flex-shrink:0}
.corb{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#00ecf8,#009aaa);display:flex;align-items:center;justify-content:center;font-size:17px}
.ctitle{flex:1}.ctit{font-weight:800;font-size:14px}.cst{font-size:10px;color:var(--g);font-weight:600}
.cclose{background:none;border:none;font-size:22px;cursor:pointer;color:#ccc;padding:4px}
#cmsgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:9px;min-height:0}
.msg{max-width:83%;padding:9px 13px;border-radius:17px;font-size:13.5px;line-height:1.5;word-break:break-word}
.mh{background:linear-gradient(135deg,rgba(0,200,215,.1),rgba(0,200,215,.04));align-self:flex-start;border-radius:4px 17px 17px 17px;color:var(--k)}
.mu{background:#111;color:#fff;align-self:flex-end;border-radius:17px 17px 4px 17px}
.mtyp{align-self:flex-start;padding:10px 14px;background:rgba(0,0,0,.04);border-radius:4px 17px 17px 17px}
.td{display:inline-block;width:6px;height:6px;border-radius:50%;background:#bbb;animation:td 1.2s infinite;margin:0 2px}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes td{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
#csugs{display:flex;flex-wrap:wrap;gap:6px;padding:7px 12px;border-top:1px solid #f5f5f5;flex-shrink:0}
.csug{padding:6px 13px;border-radius:19px;border:1.5px solid #e5e5e5;background:#fff;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:.15s}
.csug:active{border-color:var(--c)}
#cinrow{display:flex;gap:7px;padding:9px 12px max(22px,env(safe-area-inset-bottom,22px));border-top:1px solid #f0f0f0;flex-shrink:0;background:#fff}
#cin{flex:1;padding:10px 15px;border:1.5px solid #e5e5e5;border-radius:22px;font-size:14px;font-family:inherit;outline:none;transition:.2s}
#cin:focus{border-color:var(--c)}
#csend{width:38px;height:38px;border-radius:50%;background:#111;border:none;color:#fff;font-size:17px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}

#toast{position:fixed;top:max(56px,env(safe-area-inset-top,56px));left:50%;transform:translateX(-50%) translateY(-80px);z-index:99;background:#111;color:#fff;padding:9px 18px;border-radius:18px;font-size:12px;font-weight:600;white-space:nowrap;transition:transform .3s;max-width:80%;text-align:center}
#toast.show{transform:translateX(-50%) translateY(0)}
.hide{display:none!important}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
<div class="abox">
  <div class="alogo">U<b>.</b>GO</div>
  <div class="asub">Panel de Proveedores</div>
  <div class="atabs">
    <div class="atab on" onclick="sw('log')">Ingresar</div>
    <div class="atab" onclick="sw('reg')">Registrarse</div>
  </div>
  <div id="vlog" class="aform on">
    <div class="afl"><label for="le">Email</label><input id="le" type="email" placeholder="tu@email.com" autocomplete="email"></div>
    <div class="afl"><label for="lp">Contraseña</label><input id="lp" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="abtn" onclick="doLogin()">Ingresar →</button>
    <div class="aor">o continuá con</div>
    <button class="agbtn" onclick="signInGoogle()"><svg width="17" height="17" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z"/></svg> Continuar con Google</button>
    <div id="aerr"></div>
  </div>
  <div id="vreg" class="aform">
    <div class="afl"><label for="rn">Nombre completo</label><input id="rn" type="text" placeholder="Juan García" autocomplete="name"></div>
    <div class="afl"><label for="rcat">Categoría principal</label>
      <select id="rcat"><option value="Electricista">⚡ Electricista</option><option value="Plomero">🔧 Plomero</option><option value="Limpieza">🧹 Limpieza</option><option value="Pintor">🎨 Pintor</option><option value="Carpintero">🪚 Carpintero</option><option value="Cerrajero">🔑 Cerrajero</option><option value="Jardinero">🌿 Jardinero</option><option value="AC/Clima">❄️ AC/Clima</option></select>
    </div>
    <div class="afl"><label for="re">Email</label><input id="re" type="email" placeholder="tu@email.com" autocomplete="email"></div>
    <div class="afl"><label for="rp">Contraseña</label><input id="rp" type="password" placeholder="mínimo 6 caracteres" autocomplete="new-password"></div>
    <button class="abtn" onclick="doRegister()">Crear cuenta →</button>
    <div class="aor">o continuá con</div>
    <button class="agbtn" onclick="signInGoogle()"><svg width="17" height="17" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z"/></svg> Continuar con Google</button>
    <div id="aerr2"></div>
  </div>
</div>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- TOP -->
<div id="top" class="hide">
  <div><div class="tlogo">U<span>.</span>GO</div><div class="tsub" id="pname">Cargando...</div></div>
  <button id="tog" onclick="toggleOnline()"><div class="togdot"></div><div class="toglb" id="toglb">OFFLINE</div></button>
</div>

<!-- JOB INCOMING -->
<div id="jobnot">
  <div class="jnh"><div class="jnic" id="jnic">⚡</div><div><div class="jntit" id="jtit">Nuevo pedido</div><div class="jnsub" id="jsub">2.3km · R$120</div></div></div>
  <div id="jdesc" style="display:none;font-size:12px;color:#ccc;background:rgba(255,255,255,.06);border-radius:10px;padding:8px 10px;margin:8px 0 2px;line-height:1.45"></div>
  <div id="jfoto" style="display:none;margin:8px 0 2px"><img id="jfoto-img" src="" alt="foto del problema" style="width:100%;max-height:150px;object-fit:cover;border-radius:10px;cursor:pointer" onclick="window.open(this.src,'_blank')"></div>
  <div class="jnbar-bg"><div class="jnbar" id="jbar" style="width:100%"></div></div>
  <div class="jnsecs" id="jsecs">30s para aceptar</div>
  <div class="jnbtns"><button class="jnrej" onclick="rejectJob()">✕ Rechazar</button><button class="jnacc" onclick="acceptJob()">✓ Aceptar</button></div>
</div>

<!-- ACTIVE JOB BAR -->
<div id="jobbar">
  <div class="jbico" id="jbico">🔧</div>
  <div class="jbinfo" onclick="showTimelineSheet()"><div class="jbtit" id="jbtit">Trabajo activo</div><div class="jbsub" id="jbsub">En camino...</div></div>
  <button class="jbnav" id="jbnav" onclick="navigateJob()">🗺 Navegar</button>
  <button class="jbbtn" id="jbbtn" onclick="nextJobState()">Llegué</button>
</div>

<!-- SHEET -->
<div id="sheet"><div class="shandle"></div><div id="sb"></div></div>

<!-- CHAT -->
<div id="chat">
  <div class="ctop"><div class="corb">🌀</div><div class="ctitle"><div class="ctit">Hugo</div><div class="cst">● Asistente activo</div></div><button class="cclose" onclick="closeChat()">✕</button></div>
  <div id="cmsgs"></div><div id="csugs"></div>
  <div id="cinrow"><input id="cin" placeholder="Escribí tu mensaje..." onkeydown="if(event.key==='Enter')sendChat()"><button id="micbtn" onclick="startRec()" style="width:38px;height:38px;border-radius:50%;background:#111;border:none;color:#fff;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.2s">🎤</button><button id="csend" onclick="sendChat()">↑</button></div>
</div>

<!-- NAV -->
<nav id="nav" class="hide">
  <button class="ni on" id="ni-home" onclick="nav2('home')"><div class="niic">🗺</div><div class="nilb">Mapa</div></button>
  <button class="ni" id="ni-earn" onclick="nav2('earn')"><div class="niic">💰</div><div class="nilb">Ganancias</div></button>
  <div class="ni" onclick="openChat()"><button class="norb">🌀</button></div>
  <button class="ni" id="ni-shop" onclick="nav2('shop')"><div class="niic">🛒</div><div class="nilb">Insumos</div></button>
  <button class="ni" id="ni-docs" onclick="nav2('docs')"><div class="niic">📄</div><div class="nilb">Docs</div></button>
  <button class="ni" id="ni-prof" onclick="nav2('prof')"><div class="niic">👤</div><div class="nilb">Perfil</div></button>
</nav>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js">

/* ═══════════════════════════════════════════════════
   INSUMOS — Búsqueda ML filtrada por categoría
═══════════════════════════════════════════════════ */
const INSUMO_MAP = {
  electricista:  [{slug:'mat_eletrico',    label:'⚡ Material Elétrico',    q:'material eletrico cabo fio'},

let GPS_WATCH_ID=null;
let GPS_DENIED=false;
let _lastGpsWrite=0;

// Frecuencia de escritura a Supabase según contexto:
//  - en_camino (yendo al trabajo): cada 5s — el cliente necesita verte moverte en tiempo real
//  - online idle (esperando pedido): cada 45s — solo para aparecer en el radar del cliente
//  - offline: GPS apagado, cero consumo
function gpsWriteIntervalMs(){
  return jobState==='en_camino' ? 5000 : 45000;
}

function startGPS(){
  if(!navigator.geolocation){
    toast('⚠️ Tu navegador no soporta geolocalización');
    return;
  }
  if(GPS_WATCH_ID!==null)return; // ya está corriendo
  GPS_WATCH_ID=navigator.geolocation.watchPosition(
    pos=>onGpsSuccess(pos),
    err=>onGpsError(err),
    {enableHighAccuracy:true,timeout:10000,maximumAge:8000}
  );
}

function stopGPS(){
  if(GPS_WATCH_ID!==null){
    navigator.geolocation.clearWatch(GPS_WATCH_ID);
    GPS_WATCH_ID=null;
  }
}

function onGpsSuccess(pos){
  GPS_DENIED=false;
  myLat=pos.coords.latitude;myLng=pos.coords.longitude;
  if(MARKER)MARKER.setLatLng([myLat,myLng]);
  if(MAP&&!isOnline)MAP.panTo([myLat,myLng]);

  const now=Date.now();
  const dueWrite = (now-_lastGpsWrite) >= gpsWriteIntervalMs();
  if(!dueWrite)return; // throttle — no escribir a Supabase todavía

  _lastGpsWrite=now;

  // Geocode solo si no tenemos dirección guardada aún (evita llamadas innecesarias a Nominatim)
  if(PROV && !PROV.endereco){
    fetch(`https://nominatim.openstreetmap.org/reverse?lat=${myLat}&lon=${myLng}&format=json`)
      .then(r=>r.json()).then(d=>{
        const addr=d.display_name?.split(',').slice(0,3).join(', ')||'';
        if(addr){PROV.endereco=addr;}
        sb.from('usuarios').update({lat:myLat,lng:myLng,endereco:addr||null}).eq('id',SESSION.user.id);
      }).catch(()=>{
        sb.from('usuarios').update({lat:myLat,lng:myLng}).eq('id',SESSION.user.id);
      });
  } else {
    sb.from('usuarios').update({lat:myLat,lng:myLng}).eq('id',SESSION.user.id);
  }
}

function onGpsError(err){
  if(err.code===err.PERMISSION_DENIED){
    GPS_DENIED=true;
    toast('📍 Necesitamos tu ubicación para mostrarte pedidos cerca. Activala en los permisos del navegador.',4500);
    // Si estaba online, lo volvemos offline porque sin GPS no puede recibir pedidos
    if(isOnline){
      isOnline=false;
      $('tog')?.classList.remove('on');
      if($('toglb'))$('toglb').textContent='OFFLINE';
    }
  } else {
    toast('⚠️ Señal GPS débil, reintentando...',2500);
  }
}

/* ── ONLINE ── */
async function toggleOnline(){
  // Si va a pasar a online, primero verificar que el GPS funcione
  if(!isOnline && GPS_DENIED){
    toast('📍 Activá la ubicación en tu navegador para poder ponerte en línea',3500);
    return;
  }
  isOnline=!isOnline;
  $('tog').classList.toggle('on',isOnline);
  $('toglb').textContent=isOnline?'EN LÍNEA':'OFFLINE';

  if(isOnline){
    startGPS();
    _lastGpsWrite=0; // forzar escritura inmediata al pasar a online
  } else if(jobState==='idle'){
    stopGPS(); // solo apagamos GPS si no hay trabajo activo en curso
  }

  await sb.from('usuarios').update({activo:isOnline,online:isOnline,lat:myLat,lng:myLng}).eq('id',SESSION.user.id);
  toast(isOnline?'✅ Estás en línea — ya podés recibir pedidos':'⚫ Te pusiste offline');
  if(isOnline){MAP?.panTo([myLat,myLng]);} // demo de oferta fake desactivada: solo pedidos reales por Realtime
}

async function changeServiceState(svcId, newState) {
  await sb.from('servicios').update({estado: newState}).eq('id', svcId);
  if(newState==='completado') {
    nav2('earn');
    return;
  }
  if($('sb').innerHTML.includes('Progreso')) {
    const {data} = await sb.from('servicios').select('*').eq('id', svcId).single();
    if(data) {
      $('sb').innerHTML = timelineSheet(data);
    }
  }
}

function startDistanceCheck(svcId, clientLat, clientLng) {
  if(CHECKING_DISTANCE_INTERVAL) clearInterval(CHECKING_DISTANCE_INTERVAL);
  CHECKING_DISTANCE_INTERVAL = setInterval(async ()=>{
    if(!ACTIVE_SVC || ACTIVE_SVC.id!==svcId) {
      clearInterval(CHECKING_DISTANCE_INTERVAL);
      return;
    }
    if(navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(async (pos)=>{
        const d = haversineKm(pos.coords.latitude, pos.coords.longitude, clientLat, clientLng);
        if(d<0.05 && ACTIVE_SVC.estado==='en_camino') {
          const {error} = await sb.from('servicios').update({estado:'ejecutando'}).eq('id', svcId);
          if(!error) {
            alert('¡Llegaste! El servicio cambió a "Ejecutando"');
            const {data} = await sb.from('servicios').select('*').eq('id', svcId).single();
            if(data && $('sb').innerHTML.includes('Progreso')) {
              $('sb').innerHTML = timelineSheet(data);
            }
          }
        }
      });
    }
  }, 10000);
}

function haversineKm(la1, ln1, la2, ln2) {
  const R=6371, dL=(la2-la1)*Math.PI/180, dN=(ln2-ln1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dN/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

let currentDocType=null;
async function initDocs(){
  if(!SESSION)return;
  const{data}=await sb.from('documentos').select('tipo,estado').eq('usuario_id',SESSION.user.id);
  if(!data)return;
  const map={cpf:'cpf',selfie:'selfie',cert:'cert'};
  const statusMap={aprobado:'<span class="doc-status ds-ok">✓ Aprobado</span>',rechazado:'<span class="doc-status ds-err">✕ Rechazado</span>',pendiente:'<span class="doc-status ds-pen">● En revisión</span>',procesando:'<span class="doc-status ds-pen">⏳ Procesando</span>'};
  data.forEach(doc=>{
    const key=Object.keys(map).find(k=>doc.tipo.includes(k));
    if(key){const el=$('st-'+key);if(el)el.outerHTML=statusMap[doc.estado]||statusMap.pendiente;$('doc-'+key)?.classList.add('uploaded');}
  });
}
function uploadDoc(tipo){
  currentDocType=tipo;
  const inp=$('fileinput');if(inp){inp.click();}
}
async function handleFile(input){
  const file=input.files[0];if(!file||!currentDocType||!SESSION)return;
  toast('⏳ Subiendo documento...');
  const path=`${SESSION.user.id}/${currentDocType}_${Date.now()}.${file.name.split('.').pop()}`;
  const{data:up,error:upErr}=await sb.storage.from('documentos').upload(path,file);
  if(upErr){toast('❌ Error: '+upErr.message);return;}
  const url=sb.storage.from('documentos').getPublicUrl(path).data?.publicUrl||path;
  await sb.from('documentos').insert({usuario_id:SESSION.user.id,tipo:currentDocType,url_storage:url,estado:'pendiente'});
  toast('✅ Documento enviado — en revisión');
  const el=$('st-'+currentDocType);
  if(el){el.className='doc-status ds-pen';el.textContent='● En revisión';}
  $('doc-'+currentDocType)?.classList.add('uploaded');
  input.value='';
}

const HSUGS=['¿Cuánto gané hoy?','¿Cómo mejorar mi karma?','Ayuda con un cliente','¿Cómo subo mi tarifa?','Ver mis servicios del mes'];
function openChat(){document.getElementById('chat').style.height='min(85vh,700px)';showSugs(HSUGS);if(!chatHistory.length)hugoCall('__INICIO__');}
function closeChat(){document.getElementById('chat').style.height='0';}
function showSugs(list){$('csugs').innerHTML=list.map(s=>`<button class="csug" onclick="sendSug('${s.replace(/'/g,"\\'")}')">${s}</button>`).join('');}
function addMsg(role,text){const d=$('cmsgs');const el=document.createElement('div');el.className='msg '+(role==='u'?'mu':'mh');el.textContent=text;d.appendChild(el);requestAnimationFrame(()=>d.scrollTop=d.scrollHeight);}
function showTyp(on){const ex=$('mtyp');if(on&&!ex){const t=document.createElement('div');t.id='mtyp';t.className='mtyp';t.innerHTML='<span class="td"></span><span class="td"></span><span class="td"></span>';$('cmsgs').appendChild(t);$('cmsgs').scrollTop=99999;}else if(!on&&ex)ex.remove();}
async function hugoCall(msg){
  showTyp(true);
  const ctx=[PROV?`Proveedor:${PROV.nombre},Karma:${PROV.karma||5},Cat:${PROV.categoria||'?'},Servicios:${PROV.servicios_completados||0},Tarifa:R$${PROV.tarifa_base||0}`:'',`Online:${isOnline}`,`EstadoTrabajo:${jobState}`,`GPS:${myLat.toFixed(4)},${myLng.toFixed(4)}`].filter(Boolean).join(' | ');
  try{
    const r=await fetch('/api/hugo/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({role:'proveedor',message:msg,context:ctx,history:chatHistory.slice(-8)})});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();showTyp(false);
    const reply=d.hugo_mensaje||'Sin respuesta de Hugo.';
    addMsg('h',reply);chatHistory.push({role:'assistant',content:reply});hugoSpeak(reply);
  }catch(e){showTyp(false);addMsg('h','⚠️ Error: '+e.message);}
}
async function sendChat(){const inp=$('cin');const msg=inp.value.trim();if(!msg)return;inp.value='';addMsg('u',msg);chatHistory.push({role:'user',content:msg});showSugs([]);await hugoCall(msg);showSugs(HSUGS);}
function sendSug(s){addMsg('u',s);chatHistory.push({role:'user',content:s});showSugs([]);hugoCall(s).then(()=>showSugs(HSUGS));}

  if(!data?.length){el.innerHTML='<p style="color:var(--m);font-size:13px;padding:8px 0">Sin servicios completados aún.</p>';return;}
  el.innerHTML=data.map(s=>`<div class="shi"><div class="shic">🔧</div><div class="shinfo"><div class="shtit">${s.descripcion||s.categoria||'Servicio'}</div><div class="shsub">${new Date(s.created_at).toLocaleDateString('es-AR')}</div></div><div class="shval">R$${s.tarifa||0}</div></div>`).join('');
}

/* ── VOZ (Web Speech API) ── */
const hasSpeech = 'speechSynthesis' in window;
const hasRec    = 'webkitSpeechRecognition' in window || 'SpeechRecognition' in window;
let speaking = false, recording = false, rec = null;

function hugoSpeak(text) {
  if (!hasSpeech || !text) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text.slice(0, 200));
  u.lang = 'es-AR'; u.rate = 1.05; u.pitch = 1;
  // Preferir voz en español si disponible
  const voices = window.speechSynthesis.getVoices();
  const esVoice = voices.find(v => v.lang.startsWith('es'));
  if (esVoice) u.voice = esVoice;
  u.onstart = () => speaking = true;
  u.onend = () => { speaking = false; updateMicBtn(); };
  window.speechSynthesis.speak(u);
}

function startRec() {
  if (!hasRec) { toast('Tu navegador no soporta reconocimiento de voz'); return; }
  if (recording) { stopRec(); return; }
  const SR = window.webkitSpeechRecognition || window.SpeechRecognition;
  rec = new SR();
  rec.lang = 'es-AR'; rec.continuous = false; rec.interimResults = false;
  rec.onstart = () => { recording = true; updateMicBtn(); };
  rec.onresult = (e) => {
    const txt = e.results[0][0].transcript;
    const inp = document.getElementById('cin');
    if (inp) inp.value = txt;
    stopRec();
    setTimeout(() => sendChat(), 200);
  };
  rec.onerror = () => stopRec();
  rec.onend = () => { recording = false; updateMicBtn(); };
  rec.start();
}

function stopRec() {
  if (rec) { try { rec.stop(); } catch(e) {} rec = null; }
  recording = false; updateMicBtn();
}

function updateMicBtn() {
  const btn = document.getElementById('micbtn');
  if (!btn) return;
  if (recording) {
    btn.textContent = '🔴'; btn.style.background = '#EF4444';
  } else {
    btn.textContent = '🎤'; btn.style.background = '#111';
  }
}

// Esperar voces disponibles
if (hasSpeech) {
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}


/* ── REALTIME JOB SUBSCRIPTION ── */
function subscribeToJobs() {
  if (!SESSION) return;
  const uid = SESSION.user.id;

  // Escuchar notificaciones de nuevos pedidos
  sb.channel('notif_' + uid)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'notificaciones',
      filter: `usuario_id=eq.${uid}`
    }, async (payload) => {
      if (payload.new.tipo === 'nuevo_pedido') {
        const datos = payload.new.datos || {};
        const realJob = {
          ic: { Electricista:'⚡', Plomero:'🔧', Limpieza:'🧹', Pintor:'🎨', Carpintero:'🪚' }[PROV?.categoria] || '🔧',
          t: PROV?.categoria || 'Servicio',
          p: datos.tarifa || 80,
          d: (datos.lat_cliente && myLat)
               ? haversineKm(myLat, myLng, datos.lat_cliente, datos.lng_cliente).toFixed(1)
               : ((Math.random() * 4) + 0.5).toFixed(1),
          addr: datos.direccion || 'Dirección del cliente',
          servicio_id: datos.servicio_id,
          cliente_nombre: datos.cliente_nombre || 'Cliente',
          desc: datos.descripcion || '',
          foto: datos.foto_url || null
        };
        showJobOffer(realJob);
      }
    })
    .subscribe();

  // Marcar notificaciones como leídas cuando se abre la app
  setTimeout(() => {
    sb.from('notificaciones').update({ leida: true }).eq('usuario_id', uid).eq('leida', false);
  }, 3000);
}

// Override acceptJob to also update DB
const _origAcceptJob = acceptJob;
let pagoChannelProv = null;   // realtime de pagos (escrow)
let svcChannelProv  = null;   // realtime del servicio (cancelaciones del cliente)
let ESCROW_OK = false;

async function acceptJobReal() {
  clearInterval(jobTimer);
  $('jobnot').classList.remove('show');
  // ── HANDSHAKE: aceptar = CONFIRMADO. Se sale recién cuando el cliente asegura el pago ──
  jobState = 'confirmado';
  ESCROW_OK = false;
  ACTIVE_JOB = JOB;

  if (JOB?.servicio_id) {
    const {data: svc} = await sb.from('servicios')
      .select('*').eq('id', JOB.servicio_id).single();
    if(svc) ACTIVE_SVC = svc;

    await sb.from('servicios').update({
      proveedor_id: SESSION.user.id,
      estado: 'confirmado',
      confirmado_at: new Date().toISOString()
    }).eq('id', JOB.servicio_id);

    watchPagoProv(JOB.servicio_id);
    watchSvcProv(JOB.servicio_id);
    checkPagoProv(JOB.servicio_id); // por si el pago ya entró
  }

  $('jbico').textContent = ACTIVE_JOB.ic || '🔧';
  $('jbtit').textContent = (ACTIVE_JOB.t || 'Servicio') + (ACTIVE_JOB.addr ? ' — ' + ACTIVE_JOB.addr : '');
  $('jbsub').innerHTML = `R$${ACTIVE_JOB.p || 0} · ${ACTIVE_JOB.cliente_nombre || 'Cliente'}${renderTimelineMini('confirmado')}`;
  $('jobbar').classList.add('show');
  $('jbbtn').textContent = '🔒 Esperando pago...';
  $('jbbtn').disabled = true;
  $('jbbtn').style.opacity = '.55';
  toast('✅ Aceptaste el pedido. Hugo le pidió el pago al cliente — salís cuando esté protegido en la bóveda.');
}

// Escrow asegurado → habilitar salida
function onEscrowOkProv(){
  if (ESCROW_OK) return; ESCROW_OK = true;
  $('jbbtn').textContent = '🚗 Salir en camino';
  $('jbbtn').disabled = false;
  $('jbbtn').style.opacity = '1';
  $('jbsub').innerHTML = `💰 Pago protegido en la bóveda · R$${ACTIVE_JOB?.p || 0}` + renderTimelineMini('confirmado');
  toast('💰 Pago del cliente protegido en la bóveda. ¡Podés salir!');
  try{ navigator.vibrate && navigator.vibrate([120,60,120]); }catch(_){}
}
function watchPagoProv(svcId){
  if(pagoChannelProv){sb.removeChannel(pagoChannelProv);pagoChannelProv=null;}
  pagoChannelProv=sb.channel('pago_prov_'+svcId)
    .on('postgres_changes',{event:'*',schema:'public',table:'pagos',filter:`servicio_id=eq.${svcId}`},
      p=>{if(p.new?.estado==='aprobado'||p.new?.estado==='pagado')onEscrowOkProv();})
    .subscribe();
}
async function checkPagoProv(svcId){
  const{data}=await sb.from('pagos').select('estado').eq('servicio_id',svcId).in('estado',['aprobado','pagado']).limit(1);
  if(data?.length)onEscrowOkProv();
}
// Si el cliente cancela mientras esperás, enterate al instante
function watchSvcProv(svcId){
  if(svcChannelProv){sb.removeChannel(svcChannelProv);svcChannelProv=null;}
  svcChannelProv=sb.channel('svc_prov_'+svcId)
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'servicios',filter:`id=eq.${svcId}`},
      p=>{if(p.new?.estado==='cancelado')onClienteCancelo();})
    .subscribe();
}
function onClienteCancelo(){
  toast('😕 El cliente canceló el pedido.');
  cleanupJobChannels();
  jobState='idle';ESCROW_OK=false;
  ACTIVE_SVC=null;ACTIVE_JOB=null;JOB=null;
  $('jobbar').classList.remove('show');
  nav2('home');
}
function cleanupJobChannels(){
  if(pagoChannelProv){sb.removeChannel(pagoChannelProv);pagoChannelProv=null;}
  if(svcChannelProv){sb.removeChannel(svcChannelProv);svcChannelProv=null;}
}

// Paso 2 del handshake: con la bóveda asegurada, salir en camino
async function salirEnCamino(){
  jobState = 'en_camino';
  startGPS();
  _lastGpsWrite = 0; // alta frecuencia inmediata — el cliente te ve moverte en vivo
  if (ACTIVE_JOB?.servicio_id) {
    await sb.from('servicios').update({ estado: 'en_camino' }).eq('id', ACTIVE_JOB.servicio_id);
    if (ACTIVE_SVC?.lat_cliente) startDistanceCheck(ACTIVE_JOB.servicio_id, ACTIVE_SVC.lat_cliente, ACTIVE_SVC.lng_cliente);
  }
  $('jbsub').innerHTML = `R$${ACTIVE_JOB?.p || 0} · ${ACTIVE_JOB?.cliente_nombre || 'Cliente'}` + renderTimelineMini('en_camino');
  $('jbbtn').textContent = '✓ Llegué';
  toast('🚗 En camino — ¡Navegá al cliente!');
}

// Override nextJobState to update DB
async function nextJobStateReal() {
  if (jobState === 'confirmado') {
    if (!ESCROW_OK) { toast('🔒 Esperando que el cliente proteja el pago en la bóveda...'); return; }
    await salirEnCamino();
    return;
  }
  if (jobState === 'en_camino') {
    jobState = 'ejecutando';
    $('jbbtn').textContent = '✓ Completar';
    $('jbsub').innerHTML = 'Ejecutando el servicio...' + renderTimelineMini('ejecutando');
    toast('📍 Ubicación confirmada');
    if (ACTIVE_JOB?.servicio_id) {
      ACTIVE_SVC = {...ACTIVE_SVC, estado: 'ejecutando'};
      await sb.from('servicios').update({ estado: 'ejecutando' }).eq('id', ACTIVE_JOB.servicio_id);
    }
  } else if (jobState === 'ejecutando') {
    jobState = 'idle';
    $('jobbar').classList.remove('show');
    const tarifa = ACTIVE_JOB?.p || 0;
    if (ACTIVE_JOB?.servicio_id) {
      await sb.from('servicios').update({
        estado: 'completado',
        completado_at: new Date().toISOString()
      }).eq('id', ACTIVE_JOB.servicio_id);
    }
    await sb.from('usuarios').update({
      servicios_completados: (PROV?.servicios_completados || 0) + 1
    }).eq('id', SESSION.user.id);
    if (PROV) PROV.servicios_completados = (PROV.servicios_completados || 0) + 1;
    cleanupJobChannels();
    ESCROW_OK = false;
    ACTIVE_SVC = null;
    ACTIVE_JOB = null; JOB = null;
    toast(`🎉 Servicio completado · R$${(tarifa*0.85).toFixed(0)} netos van a tu bóveda al aprobarlo el cliente`);
    nav2('home');
  }
}

/* ── SCOUT: Invitación de Hugo ── */
(function(){
  const params = new URLSearchParams(location.search);
  const invId  = params.get('inv');
  if (!invId) return;

  // Mostrar overlay de invitación
  async function loadInvitacion() {
    try {
      const r = await fetch(
        `${SB_URL}/rest/v1/invitaciones_scout?id=eq.${invId}&select=*,prospectos_scouts(nombre,categoria,ciudad)`,
        { headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` } }
      );
      const data = await r.json();
      const inv  = data?.[0];
      if (!inv || inv.estado === 'rechazada') return;

      const prosp = inv.prospectos_scouts || {};
      const msg   = inv.mensaje_hugo || `¡Hola ${prosp.nombre || ''}! Te invitamos a unirte a U.GO.`;

      // Crear overlay
      const overlay = document.createElement('div');
      overlay.id = 'inv-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(26,32,48,.97);display:flex;align-items:center;justify-content:center;padding:20px;';
      overlay.innerHTML = `
        <div style="background:#FFF;border-radius:20px;padding:24px;max-width:360px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.4);">
          <div style="text-align:center;margin-bottom:16px;">
            <div style="width:56px;height:56px;border-radius:50%;background:rgba(0,200,215,.12);border:2px solid rgba(0,200,215,.3);display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 10px;">🌀</div>
            <div style="font-size:17px;font-weight:800;color:#111;letter-spacing:-.3px;">U.GO te invita</div>
            <div style="font-size:12px;color:#888;margin-top:3px;">Marketplace de servicios LATAM</div>
          </div>
          <div style="background:#F8F9FA;border-radius:12px;padding:14px;font-size:13px;line-height:1.7;color:#333;margin-bottom:16px;white-space:pre-wrap;">${msg}</div>
          <div style="display:grid;gap:8px;">
            <button onclick="invAceptar('${invId}')" style="padding:13px;background:#00C8D7;border:none;border-radius:12px;color:#FFF;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">✓ ¡Quiero unirme a U.GO!</button>
            <button onclick="invCerrar('${invId}')" style="padding:11px;background:transparent;border:1.5px solid #EBEBEB;border-radius:12px;color:#888;font-size:13px;cursor:pointer;font-family:inherit;">Ahora no</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);
    } catch(e) { console.warn('[Scout inv]', e); }
  }

  window.invAceptar = async function(id) {
    try {
      await fetch(`${SB_URL}/rest/v1/invitaciones_scout?id=eq.${id}`, {
        method: 'PATCH',
        headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ estado: 'aceptada', fecha_respuesta: new Date().toISOString() })
      });
    } catch {}
    document.getElementById('inv-overlay')?.remove();
    // Si no está logueado, mostrar pantalla de auth
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      const auth = document.getElementById('auth');
      if (auth) auth.classList.remove('hide');
      toast('¡Genial! Creá tu cuenta para continuar 🚀');
    }
  };

  window.invCerrar = async function(id) {
    try {
      await fetch(`${SB_URL}/rest/v1/invitaciones_scout?id=eq.${id}`, {
        method: 'PATCH',
        headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ estado: 'rechazada', fecha_respuesta: new Date().toISOString() })
      });
    } catch {}
    document.getElementById('inv-overlay')?.remove();
  };

  // Cargar después de que el DOM esté listo
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadInvitacion);
  } else {
    loadInvitacion();
  }
})();
