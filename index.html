<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>U.GO — Panel de Control</title>
    <meta name="robots" content="noindex,nofollow" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #070a0d; overflow: hidden; }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
  <body>
    <div id="root"></div>
      <script>
    // OAuth redirect intercept — si venimos del callback de Google, ir al destino correcto
    (function(){
      var dest = localStorage.getItem('ugo_oauth_dest');
      if (dest && (location.hash.includes('access_token') || location.search.includes('code='))) {
        localStorage.removeItem('ugo_oauth_dest');
        window.location.replace(dest);
      }
    })();
  </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
